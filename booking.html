<style>

  /* Grid cell hover */

  .court-color-4 { background-color: rgba(130,50,130,0.80); }
  .court-color-5 { background-color: rgba(180,90,20,0.80); }
  .court-color-6 { background-color: rgba(180,30,80,0.80); }
  .court-color-7 { background-color: rgba(20,100,160,0.80); }

<script>
// ── Current user ──────────────────────────────────
let currentUserId = null
let currentRole = 'mitglied'
;(function() {
  currentUserId = sessionStorage.getItem('tc_auth')
  if (currentUserId) {
    try {
      const p = JSON.parse(localStorage.getItem('tc_profiles') || '{}')[currentUserId]
      if (p?.role) currentRole = p.role
      else if (currentUserId === 'admin@tennisclub-bss.de') currentRole = 'admin'
    } catch(e) {}
  }
  // Hide court controls for members
  if (currentRole === 'mitglied') {
    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('court-controls-wrap')?.classList.add('hidden')
    }, { once: true })
    document.getElementById('court-controls-wrap')?.classList.add('hidden')
  }
  // Show Mannschaftstraining for non-members
  if (currentRole !== 'mitglied') {
    document.addEventListener('DOMContentLoaded', () => {
      const el = document.getElementById('team-type-label')
      if (el) el.style.display = ''
    }, { once: true })
  }
})()

// ── Data ──────────────────────────────────────────
function getSettings() {
  try { return JSON.parse(localStorage.getItem('tc_settings') || '{}') } catch(e) { return {} }
}
function saveSettings(s) { localStorage.setItem('tc_settings', JSON.stringify(s)) }

function getNumCourts() { return Math.max(1, Math.min(12, getSettings().numCourts || 6)) }
function setNumCourts(n) { const s = getSettings(); s.numCourts = Math.max(1, Math.min(12, n)); saveSettings(s); render() }

function getBookings() {
  try { return JSON.parse(localStorage.getItem('tc_bookings') || '[]') } catch(e) { return [] }
}
function saveBookings(b) { localStorage.setItem('tc_bookings', JSON.stringify(b)) }

function getMembers() {
  try { return JSON.parse(localStorage.getItem('tc_members') || '[]') } catch(e) { return [] }
}

function getBookingRules() {
  const def = {
    mitglied:     { singles: { maxDurationMins: 90,  maxPerPeriod: 2,  periodDays: 7 }, doubles: { maxDurationMins: 120, maxPerPeriod: 3,  periodDays: 7 } },
    veranstalter: { singles: { maxDurationMins: 180, maxPerPeriod: 10, periodDays: 7 }, doubles: { maxDurationMins: 180, maxPerPeriod: 10, periodDays: 7 } }
  }
  const saved = getSettings().bookingRules || {}
  return {
    mitglied:     { singles: { ...def.mitglied.singles,     ...(saved.mitglied?.singles     || {}) }, doubles: { ...def.mitglied.doubles,     ...(saved.mitglied?.doubles     || {}) } },
    veranstalter: { singles: { ...def.veranstalter.singles, ...(saved.veranstalter?.singles || {}) }, doubles: { ...def.veranstalter.doubles, ...(saved.veranstalter?.doubles || {}) } }
  }
}

function validateBookingRules(type, timeStart, timeEnd) {
  if (currentRole === 'admin') return null
  const roleKey = currentRole === 'veranstalter' ? 'veranstalter' : 'mitglied'
  const rule = getBookingRules()[roleKey]?.[type]
  if (!rule) return null
  const durationMins = toMinutes(timeEnd) - toMinutes(timeStart)
  const roleLabel = roleKey === 'veranstalter' ? 'Veranstalter' : 'Mitglieder'
  const typeLabel = type === 'singles' ? 'Einzel' : 'Doppel'
  if (durationMins > rule.maxDurationMins) {
    return `Maximale Buchungsdauer für ${roleLabel} (${typeLabel}): ${rule.maxDurationMins} Min.`
  }
  if (currentUserId) {
    const cutoff = new Date()
    cutoff.setDate(cutoff.getDate() - rule.periodDays)
    const cutoffIso = isoDate(cutoff)
    const count = getBookings().filter(b => b.userId === currentUserId && b.type === type && b.date >= cutoffIso).length
    if (count >= rule.maxPerPeriod) {
      return `Limit erreicht: max. ${rule.maxPerPeriod} ${typeLabel}-Buchungen pro ${rule.periodDays} Tagen.`
    }
  }
  return null
}

function saveBookingRules() {
  const n = id => parseInt(document.getElementById(id)?.value) || 0
  const rules = {
    mitglied:     { singles: { maxDurationMins: n('rule-m-s-dur') || 90,  maxPerPeriod: n('rule-m-s-cnt') || 2,  periodDays: n('rule-m-s-days') || 7 },
                    doubles: { maxDurationMins: n('rule-m-d-dur') || 120, maxPerPeriod: n('rule-m-d-cnt') || 3,  periodDays: n('rule-m-d-days') || 7 } },
    veranstalter: { singles: { maxDurationMins: n('rule-v-s-dur') || 180, maxPerPeriod: n('rule-v-s-cnt') || 10, periodDays: n('rule-v-s-days') || 7 },
                    doubles: { maxDurationMins: n('rule-v-d-dur') || 180, maxPerPeriod: n('rule-v-d-cnt') || 10, periodDays: n('rule-v-d-days') || 7 } }
  }
  const s = getSettings()
  s.bookingRules = rules
  saveSettings(s)
  toast('Buchungsregeln gespeichert')
}

// ── Helpers ───────────────────────────────────────
function esc(s) { return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') }

function toMinutes(hhmm) {
  const [h, m] = hhmm.split(':').map(Number)
  return h * 60 + m
}
function fromMinutes(min) {
  return String(Math.floor(min / 60)).padStart(2, '0') + ':' + String(min % 60).padStart(2, '0')
}

function formatDate(iso) {
  const d = new Date(iso + 'T00:00:00')
  return d.toLocaleDateString('de-DE', { weekday:'short', day:'numeric', month:'short' })
}

function isoDate(d) {
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0')
}

function getMondayOf(d) {
  const copy = new Date(d)
  const day = copy.getDay() || 7
  copy.setDate(copy.getDate() - day + 1)
  copy.setHours(0,0,0,0)
  return copy
}

const TIME_START = 8 * 60   // 08:00
const TIME_END   = 22 * 60  // 22:00
const SLOT_MIN   = 30       // 30-minute slots

const COURT_COLORS = [
  'court-color-1','court-color-2','court-color-3','court-color-4',
  'court-color-5','court-color-6','court-color-7','court-color-8'
]

// ── Day state ─────────────────────────────────────
let _viewDate = new Date()
_viewDate.setHours(0,0,0,0)
let _viewMode = 'today' // 'today' | 'week'

function prevDay() { _viewDate.setDate(_viewDate.getDate() - 1); render() }
function nextDay() { _viewDate.setDate(_viewDate.getDate() + 1); render() }
function goToday() { _viewDate = new Date(); _viewDate.setHours(0,0,0,0); render() }
function toggleViewMode() {
  _viewMode = _viewMode === 'today' ? 'week' : 'today'
  if (_viewMode === 'today') goToday()
  else render()
}

function setCourts(delta) { setNumCourts(getNumCourts() + delta) }

// ── Render ────────────────────────────────────────
function render() {
  const numCourts = getNumCourts()
  document.getElementById('courts-count').textContent = numCourts

  // Rules editor — admin/veranstalter only
  const rulesEl = document.getElementById('rules-editor')
  if (rulesEl && (currentRole === 'admin' || currentRole === 'veranstalter')) {
    const r = getBookingRules()
    const inp = (id, val, min, max) =>
      `<input type="number" id="${id}" value="${val}" min="${min}" max="${max}" class="w-16 bg-white/10 border border-white/15 text-white rounded-lg px-2 py-1 text-sm font-body text-center focus:outline-none focus:border-secondary-fixed"/>`
    const row = (label, prefix, rules) =>
      `<tr><th scope="row" class="py-1.5 pr-4 text-white/60 whitespace-nowrap font-normal text-left">${label}</th>
       <td class="py-1.5 px-2 text-center">${inp(prefix+'-dur', rules.maxDurationMins, 30, 480)}</td>
       <td class="py-1.5 px-2 text-center">${inp(prefix+'-cnt', rules.maxPerPeriod, 1, 99)}</td>
       <td class="py-1.5 px-2 text-center">${inp(prefix+'-days', rules.periodDays, 1, 365)}</td></tr>`
    rulesEl.innerHTML = `
      <div class="rounded-2xl border border-white/8 bg-black/10 p-4">
        <div class="flex items-center justify-between mb-3">
          <h2 class="font-headline font-bold text-white text-sm flex items-center gap-1.5">
            <span class="material-symbols-outlined text-sm text-secondary-fixed">rule</span>Buchungsregeln
          </h2>
          <button onclick="saveBookingRules()" class="px-3 py-1.5 rounded-xl text-xs font-headline font-bold bg-secondary-fixed text-on-secondary-fixed hover:bg-secondary-fixed-dim transition-colors">Speichern</button>
        </div>
        <div class="overflow-x-auto">
          <table class="text-xs font-body w-full">
            <thead><tr class="text-white/30 uppercase tracking-wide text-left">
              <th scope="col" class="pb-2 pr-4">Gruppe</th>
              <th scope="col" class="pb-2 px-2 text-center">Max. Dauer (min)</th>
              <th scope="col" class="pb-2 px-2 text-center">Max. Buchungen</th>
              <th scope="col" class="pb-2 px-2 text-center">pro … Tage</th>
            </tr></thead>
            <tbody class="divide-y divide-white/5">
              ${row('Mitglied · Einzel',      'rule-m-s', r.mitglied.singles)}
              ${row('Mitglied · Doppel',      'rule-m-d', r.mitglied.doubles)}
              ${row('Veranstalter · Einzel',  'rule-v-s', r.veranstalter.singles)}
              ${row('Veranstalter · Doppel',  'rule-v-d', r.veranstalter.doubles)}
            </tbody>
          </table>
        </div>
      </div>`
  } else if (rulesEl) {
    rulesEl.innerHTML = ''
  }

  // Day navigation / week pills
  const dayNavEl = document.getElementById('day-nav')
  if (dayNavEl) dayNavEl.style.display = _viewMode === 'today' ? '' : 'none'
  const weekPillsEl = document.getElementById('week-pills')
  if (weekPillsEl) {
    if (_viewMode === 'week') {
      const todayD = new Date(); todayD.setHours(0,0,0,0)
      let pills = ''
      for (let i = 0; i < 7; i++) {
        const d = new Date(todayD); d.setDate(todayD.getDate() + i)
        const diso = isoDate(d)
        const isSelected = diso === isoDate(_viewDate)
        const dayShort = d.toLocaleDateString('de-DE', { weekday:'short' })
        const dayNum = d.getDate()
        pills += `<button onclick="_viewDate=new Date('${diso}T00:00:00');render()"
          class="flex flex-col items-center px-3 py-1.5 rounded-xl text-xs font-headline font-bold transition-colors min-w-[3.5rem] ${isSelected ? 'bg-secondary-fixed text-on-secondary-fixed' : 'bg-black/8 hover:bg-black/15 text-white/60'}"
          aria-pressed="${isSelected}"
          aria-label="${d.toLocaleDateString('de-DE', {weekday:'long', day:'numeric', month:'long'})}">
          <span class="text-[10px] uppercase tracking-wide opacity-70">${dayShort}</span>
          <span class="text-base leading-tight">${dayNum}</span>
          ${i === 0 ? '<span class="w-1 h-1 rounded-full bg-current mt-0.5 opacity-60"></span>' : ''}
        </button>`
      }
      weekPillsEl.innerHTML = pills
      weekPillsEl.style.display = ''
    } else {
      weekPillsEl.style.display = 'none'
    }
  }
  const viewModeLabel = document.getElementById('view-mode-label')
  if (viewModeLabel) viewModeLabel.textContent = _viewMode === 'today' ? '7 Tage' : 'Heute'

  // Day label (only in today mode)
  const isToday = isoDate(_viewDate) === isoDate(new Date())
  const dayLabel = _viewDate.toLocaleDateString('de-DE', { weekday:'long', day:'numeric', month:'long' })
  const dayLabelEl = document.getElementById('day-label')
  if (dayLabelEl) dayLabelEl.textContent = dayLabel + (isToday ? ' · Heute' : '')

  const iso = isoDate(_viewDate)
  const bookings = getBookings()

  // Time slots
  const slots = []
  for (let m = TIME_START; m < TIME_END; m += SLOT_MIN) slots.push(m)

  // Day view: rows = time slots, columns = courts
  let html = `<table class="w-full border-collapse text-xs" aria-label="Platzbuchungskalender" style="table-layout:fixed">`

  // Header: time col + one col per court
  html += `<thead><tr>`
  html += `<th class="w-14 py-2 px-1 border-b border-white/8 border-r border-white/8 sticky left-0 top-0 bg-black/20 z-20"></th>`
  for (let c = 1; c <= numCourts; c++) {
    const colorClass = COURT_COLORS[(c-1) % COURT_COLORS.length]
    html += `<th class="py-2 font-headline font-bold text-white/70 border-b border-white/8 sticky top-0 bg-black/20 backdrop-blur z-20 ${c < numCourts ? 'border-r border-white/5' : ''}">
      <span class="inline-block w-5 h-5 rounded-full ${colorClass} text-white text-[10px] leading-5 text-center font-bold mr-1 opacity-80">${c}</span>Platz ${c}
    </th>`
  }
  html += `</tr></thead>`

  // Body: one row per time slot
  html += `<tbody>`
  slots.forEach(slotMin => {
    const isHour = slotMin % 60 === 0
    html += `<tr>`
    html += `<td class="py-0 px-1 text-center font-body text-white/30 border-r border-white/8 sticky left-0 bg-black/10 z-10 ${isHour ? 'border-t border-white/8' : ''}" style="height:40px;vertical-align:top;padding-top:5px;">${isHour ? fromMinutes(slotMin) : ''}</td>`

    for (let c = 1; c <= numCourts; c++) {
      const booking = bookings.find(b =>
        b.date === iso && b.court === c &&
        toMinutes(b.timeStart) <= slotMin && toMinutes(b.timeEnd) > slotMin
      )
      const isSlotStart = booking && toMinutes(booking.timeStart) === slotMin
      const colBorder = c < numCourts ? 'border-r border-white/5' : ''
      const topBorder = isHour ? 'border-t border-white/8' : ''

      if (booking && !isSlotStart) {
        html += `<td class="${colBorder} ${topBorder}" style="height:40px;"></td>`
      } else if (booking && isSlotStart) {
        const durationSlots = Math.round((toMinutes(booking.timeEnd) - toMinutes(booking.timeStart)) / SLOT_MIN)
        const colorClass = COURT_COLORS[(c-1) % COURT_COLORS.length]
        html += `<td rowspan="${durationSlots}" class="${colorClass} ${colBorder} rounded-lg cursor-pointer" style="height:${durationSlots*40}px;padding:4px 6px;vertical-align:top;" onclick="showDetail('${booking.id}')">`
        html += `<div class="text-white font-headline font-bold leading-tight truncate text-xs">${esc(booking.memberName)}</div>`
        if (durationSlots > 1) html += `<div class="text-white/70 text-[10px] leading-tight">${booking.timeStart}–${booking.timeEnd}</div>`
        if (booking.type) html += `<div class="text-white/50 text-[9px]">${booking.type === 'doubles' ? 'Doppel' : 'Einzel'}</div>`
        html += `</td>`
      } else {
        html += `<td class="slot-cell ${colBorder} ${topBorder}" style="height:40px;" onclick="openBook('${iso}',${c},'${fromMinutes(slotMin)}')"></td>`
      }
    }
    html += `</tr>`
  })

  html += `</tbody></table>`
  document.getElementById('calendar').innerHTML = html
}

// ── Time select helpers ───────────────────────────
function buildTimeOptions(selectEl, selectedVal) {
  selectEl.innerHTML = ''
  for (let m = TIME_START; m <= TIME_END; m += SLOT_MIN) {
    const opt = document.createElement('option')
    opt.value = fromMinutes(m)
    opt.textContent = fromMinutes(m)
    if (fromMinutes(m) === selectedVal) opt.selected = true
    selectEl.appendChild(opt)
  }
}

function buildCourtOptions(selectEl, selectedCourt) {
  selectEl.innerHTML = ''
  for (let c = 1; c <= getNumCourts(); c++) {
    const opt = document.createElement('option')
    opt.value = c
    opt.textContent = 'Platz ' + c
    if (c === selectedCourt) opt.selected = true
    selectEl.appendChild(opt)
  }
}

// ── Partners + reschedule state ───────────────────
let _partners = []
let _rescheduleId = null

function renderPartnerChips() {
  const wrap = document.getElementById('partner-chips')
  if (!wrap) return
  wrap.innerHTML = _partners.map(name =>
    `<span class="partner-chip">${esc(name)}<button type="button" onclick="removePartner(${JSON.stringify(name)})" class="ml-1 w-5 h-5 flex items-center justify-center rounded-full text-white/60 hover:text-red-400 hover:bg-white/10 text-sm leading-none">×</button></span>`
  ).join('')
}

function addPartner(name) {
  const type = document.querySelector('input[name="book-type"]:checked')?.value || 'singles'
  const maxP = type === 'team' ? 99 : 3
  if (_partners.includes(name) || _partners.length >= maxP) return
  _partners.push(name)
  renderPartnerChips()
  document.getElementById('partner-input').value = ''
  document.getElementById('partner-suggest').classList.add('hidden')
}

function removePartner(name) {
  _partners = _partners.filter(n => n !== name)
  renderPartnerChips()
}

function onSoloTrainingChange() {
  const solo = document.getElementById('solo-training').checked
  const inputWrap = document.getElementById('partner-input-wrap')
  if (inputWrap) inputWrap.style.opacity = solo ? '0.4' : '1'
  const input = document.getElementById('partner-input')
  if (input) input.disabled = solo
}

function updatePartnerSection() {
  const type = document.querySelector('input[name="book-type"]:checked')?.value || 'singles'
  const soloLabel = document.getElementById('solo-training-label')
  const hint = document.getElementById('partner-hint')
  if (type === 'team') {
    if (soloLabel) soloLabel.style.display = 'none'
    if (hint) hint.textContent = 'Beliebig viele Mitspieler möglich.'
    // Remove partner cap: if over 3 was applied before, no action needed
  } else {
    if (soloLabel) soloLabel.style.display = ''
    if (hint) hint.textContent = 'Max. 3 Mitspieler bei Einzel/Doppel.'
    // Trim to 3 if switching back from team
    if (_partners.length > 3) { _partners = _partners.slice(0, 3); renderPartnerChips() }
  }
}

// ── Book modal ────────────────────────────────────
function openBook(date, court, timeStart) {
  // Reset reschedule state (new booking)
  _rescheduleId = null
  document.querySelector('#modal-book h2').textContent = 'Platz buchen'
  document.querySelector('#modal-book button[onclick="confirmBook()"]').innerHTML =
    '<span class="material-symbols-outlined text-base">event_available</span>Buchen'

  document.getElementById('book-date').value = date
  buildCourtOptions(document.getElementById('book-court'), court)
  buildTimeOptions(document.getElementById('book-start'), timeStart)

  // Default end = start + 1h
  const endMin = Math.min(toMinutes(timeStart) + 60, TIME_END)
  buildTimeOptions(document.getElementById('book-end'), fromMinutes(endMin))

  // Auto-fill logged-in user's display name
  const _autoName = currentUserId
    ? (JSON.parse(localStorage.getItem('tc_profiles') || '{}')[currentUserId]?.display_name || '')
    : ''
  document.getElementById('book-member').value = _autoName
  document.getElementById('book-note').value = ''
  document.getElementById('book-conflict').classList.add('hidden')
  document.getElementById('suggest-list').classList.add('hidden')

  // Reset partners
  _partners = []
  renderPartnerChips()
  const soloEl = document.getElementById('solo-training')
  if (soloEl) soloEl.checked = false
  const inputEl = document.getElementById('partner-input')
  if (inputEl) { inputEl.value = ''; inputEl.disabled = false }
  document.getElementById('partner-suggest')?.classList.add('hidden')
  document.querySelector('input[name="book-type"][value="singles"]').checked = true
  updatePartnerSection()

  document.getElementById('modal-book').showModal()
  setTimeout(() => document.getElementById('book-member').focus(), 50)

  // Update end options when start changes
  document.getElementById('book-start').onchange = () => {
    const startMin = toMinutes(document.getElementById('book-start').value)
    const curEnd = toMinutes(document.getElementById('book-end').value)
    buildTimeOptions(document.getElementById('book-end'), fromMinutes(Math.max(curEnd, startMin + SLOT_MIN)))
  }
}

function confirmBook() {
  const date   = document.getElementById('book-date').value
  const court  = parseInt(document.getElementById('book-court').value)
  const start  = document.getElementById('book-start').value
  const end    = document.getElementById('book-end').value
  const member = document.getElementById('book-member').value.trim()
  const note   = document.getElementById('book-note').value.trim()
  const type   = document.querySelector('input[name="book-type"]:checked')?.value || 'singles'
  const soloTraining = document.getElementById('solo-training')?.checked || false
  const conflict = document.getElementById('book-conflict')

  if (!member) { conflict.textContent = 'Bitte einen Namen eingeben.'; conflict.classList.remove('hidden'); return }
  if (toMinutes(end) <= toMinutes(start)) { conflict.textContent = 'Endzeit muss nach Startzeit liegen.'; conflict.classList.remove('hidden'); return }

  // Partner validation
  if (type !== 'team' && !soloTraining && _partners.length === 0) {
    conflict.textContent = 'Bitte mindestens einen Mitspieler wählen oder Einzeltraining aktivieren.'
    conflict.classList.remove('hidden'); return
  }

  const ruleErr = type !== 'team' ? validateBookingRules(type, start, end) : null
  if (ruleErr) { conflict.textContent = ruleErr; conflict.classList.remove('hidden'); return }

  // Check overlap (exclude the booking being rescheduled)
  let bookings = getBookings()
  const overlapCheck = _rescheduleId ? bookings.filter(b => b.id !== _rescheduleId) : bookings
  const overlap = overlapCheck.find(b =>
    b.date === date && b.court === court &&
    toMinutes(b.timeStart) < toMinutes(end) && toMinutes(b.timeEnd) > toMinutes(start)
  )
  if (overlap) {
    conflict.textContent = `Platz ${court} ist von ${overlap.timeStart}–${overlap.timeEnd} bereits durch ${overlap.memberName} belegt.`
    conflict.classList.remove('hidden')
    return
  }

  const isReschedule = !!_rescheduleId
  if (_rescheduleId) {
    bookings = bookings.filter(b => b.id !== _rescheduleId)
    _rescheduleId = null
  }
  bookings.push({
    id: Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
    date, court, timeStart: start, timeEnd: end,
    memberName: member, note, type, userId: currentUserId,
    partners: [..._partners],
    createdAt: new Date().toISOString()
  })
  saveBookings(bookings)
  document.getElementById('modal-book').close()
  toast(isReschedule ? 'Buchung verschoben' : 'Buchung gespeichert')
  render()
}

// ── Detail modal ──────────────────────────────────
let _detailId = null
function showDetail(id) {
  const b = getBookings().find(x => x.id === id)
  if (!b) return
  _detailId = id
  document.getElementById('detail-member').textContent = b.memberName
  const typeLabel = b.type === 'doubles' ? 'Doppel' : b.type === 'team' ? 'Mannschaftstraining' : 'Einzel'
  document.getElementById('detail-court').textContent = 'Platz ' + b.court + (b.type ? ' · ' + typeLabel : '')
  document.getElementById('detail-time').textContent =
    b.date.split('-').reverse().join('.') + ' · ' + b.timeStart + '–' + b.timeEnd +
    ' (' + Math.round((toMinutes(b.timeEnd) - toMinutes(b.timeStart)) / 60 * 10) / 10 + ' h)'
  const noteRow = document.getElementById('detail-note-row')
  if (b.note) {
    document.getElementById('detail-note').textContent = b.note
    noteRow.classList.remove('hidden')
  } else {
    noteRow.classList.add('hidden')
  }
  const partnersRow = document.getElementById('detail-partners-row')
  if (b.partners?.length) {
    document.getElementById('detail-partners').textContent = b.partners.join(', ')
    partnersRow.classList.remove('hidden')
  } else {
    partnersRow.classList.add('hidden')
  }
  document.getElementById('modal-detail').showModal()
}

function exportDetailICS() {
  const b = getBookings().find(x => x.id === _detailId)
  if (!b) return
  exportBookingICS(b)
}

function exportBookingICS(b) {
  if (!b) return
  const dtStart = b.date.replace(/-/g,'') + 'T' + b.timeStart.replace(':','') + '00'
  const dtEnd   = b.date.replace(/-/g,'') + 'T' + b.timeEnd.replace(':','') + '00'
  const typeLabel = b.type === 'doubles' ? 'Doppel' : b.type === 'team' ? 'Mannschaftstraining' : 'Einzel'
  const desc = typeLabel + (b.partners?.length ? ' mit ' + b.partners.join(', ') : '') + (b.note ? ' · ' + b.note : '')
  const ics = [
    'BEGIN:VCALENDAR', 'VERSION:2.0', 'PRODID:-//TC BSS//Platzbuchung//DE',
    'BEGIN:VEVENT',
    'UID:' + (b.id || Date.now()) + '@tc-bss',
    'DTSTART;TZID=Europe/Berlin:' + dtStart,
    'DTEND;TZID=Europe/Berlin:' + dtEnd,
    'SUMMARY:Platzbuchung – Platz ' + b.court,
    'DESCRIPTION:' + desc,
    'LOCATION:TC Bad Soden-Salmünster – Platz ' + b.court,
    'END:VEVENT', 'END:VCALENDAR'
  ].join('\r\n')
  const a = document.createElement('a')
  a.href = 'data:text/calendar;charset=utf-8,' + encodeURIComponent(ics)
  a.download = 'buchung_platz' + b.court + '_' + b.date + '.ics'
  document.body.appendChild(a); a.click(); document.body.removeChild(a)
}

function deleteBooking() {
  if (!_detailId) return
  const bookings = getBookings().filter(b => b.id !== _detailId)
  saveBookings(bookings)
  document.getElementById('modal-detail').close()
  toast('Buchung gelöscht')
  render()
}

function cancelBooking() {
  if (!_detailId) return
  const bookings = getBookings().filter(b => b.id !== _detailId)
  saveBookings(bookings)
  document.getElementById('modal-detail').close()
  toast('Buchung storniert')
  render()
}

function rescheduleBooking() {
  const b = getBookings().find(x => x.id === _detailId)
  if (!b) return
  _rescheduleId = _detailId
  document.getElementById('modal-detail').close()
  // Open booking modal with all existing values pre-filled
  openBook(b.date, b.court, b.timeStart)
  // Override end time (openBook sets start+1h by default)
  buildTimeOptions(document.getElementById('book-end'), b.timeEnd)
  // Restore member, note, type
  document.getElementById('book-member').value = b.memberName
  document.getElementById('book-note').value = b.note || ''
  const typeRadio = document.querySelector(`input[name="book-type"][value="${b.type || 'singles'}"]`)
  if (typeRadio) { typeRadio.checked = true; updatePartnerSection() }
  // Restore partners
  _partners = [...(b.partners || [])]
  renderPartnerChips()
  // Restore solo training checkbox
  const soloEl = document.getElementById('solo-training')
  if (soloEl) soloEl.checked = (b.partners?.length === 0 && b.type !== 'team' && !b.note?.includes('Mannschaft'))
  // Update modal title and button
  document.querySelector('#modal-book h2').textContent = 'Buchung verschieben'
  document.querySelector('#modal-book button[onclick="confirmBook()"]').innerHTML =
    '<span class="material-symbols-outlined text-base">edit_calendar</span>Verschieben'
}

// ── Autocomplete ──────────────────────────────────
const memberInput = document.getElementById('book-member')
const suggestList = document.getElementById('suggest-list')

memberInput.addEventListener('input', () => {
  const q = memberInput.value.trim().toLowerCase()
  if (!q) { suggestList.classList.add('hidden'); return }
  const matches = getMembers().filter(m => m.name.toLowerCase().includes(q)).slice(0, 8)
  if (!matches.length) { suggestList.classList.add('hidden'); return }
  suggestList.innerHTML = matches.map(m =>
    `<li role="option" onclick="selectMember('${m.name.replace(/'/g,"\\'")}')"> ${esc(m.name)}</li>`
  ).join('')
  suggestList.classList.remove('hidden')
})

document.addEventListener('click', e => {
  if (!suggestList.contains(e.target) && e.target !== memberInput) suggestList.classList.add('hidden')
  const pSuggest = document.getElementById('partner-suggest')
  const pInput   = document.getElementById('partner-input')
  if (pSuggest && !pSuggest.contains(e.target) && e.target !== pInput) pSuggest.classList.add('hidden')
})

function selectMember(name) {
  memberInput.value = name
  suggestList.classList.add('hidden')
}

// Partner autocomplete
document.getElementById('partner-input').addEventListener('input', function() {
  const q = this.value.trim().toLowerCase()
  const pSuggest = document.getElementById('partner-suggest')
  if (!q) { pSuggest.classList.add('hidden'); return }
  const bookerName = document.getElementById('book-member').value.trim()
  const matches = getMembers()
    .filter(m => m.name.toLowerCase().includes(q) && !_partners.includes(m.name) && m.name !== bookerName)
    .slice(0, 8)
  if (!matches.length) { pSuggest.classList.add('hidden'); return }
  pSuggest.innerHTML = matches.map(m =>
    `<li role="option" onclick="addPartner('${m.name.replace(/'/g,"\\'")}')"> ${esc(m.name)}</li>`
  ).join('')
  pSuggest.classList.remove('hidden')
})

// ── Toast ─────────────────────────────────────────
function toast(msg) {
  const el = document.getElementById('toast')
  el.textContent = msg
  el.style.opacity = '1'
  el.style.transform = 'translateY(0) translateX(-50%)'
  setTimeout(() => { el.style.opacity = '0'; el.style.transform = 'translateY(8px) translateX(-50%)' }, 2500)
}

// ── Init ──────────────────────────────────────────
render()

// Auto-open from URL params (dashboard Gantt click or reschedule link)
;(function() {
  const p = new URLSearchParams(location.search)

  // ?reschedule=BOOKING_ID — open reschedule flow for an existing booking
  const rid = p.get('reschedule')
  if (rid) {
    const b = getBookings().find(x => x.id === rid)
    if (b) {
      const target = new Date(b.date + 'T00:00:00')
      if (!isNaN(target.getTime())) { _viewDate = target; render() }
      setTimeout(() => { _detailId = rid; rescheduleBooking() }, 0)
    }
    return
  }

  // ?date=…&court=…&start=… — open new booking pre-filled
  const d = p.get('date'), c = p.get('court'), s = p.get('start')
  if (d && c && s) {
    const target = new Date(d + 'T00:00:00')
    if (!isNaN(target.getTime())) { _viewDate = target; render() }
    setTimeout(() => openBook(d, parseInt(c), s), 0)
  }
})()
</script>

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js'))
}
</script>
