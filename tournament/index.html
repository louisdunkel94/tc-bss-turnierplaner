<script>
// ════════════════════════════════════════════════
//  POCKETBASE + AUTH
// ════════════════════════════════════════════════
const POCKETBASE_URL = (typeof CONFIG !== 'undefined' ? CONFIG.POCKETBASE_URL : null) || 'YOUR_POCKETBASE_URL'
const DEMO_MODE = POCKETBASE_URL === 'YOUR_POCKETBASE_URL'
const pb = DEMO_MODE ? null : new PocketBase(POCKETBASE_URL)
let _tournamentId = new URLSearchParams(location.search).get('id')

async function initAuth() {
  if (DEMO_MODE) return true
  if (!sessionStorage.getItem('tc_auth')) { window.location.replace('../'); return false }
  return true
}

async function sbSave() {
  if (!_tournamentId) return
  if (DEMO_MODE) {
    try {
      const tourneys = JSON.parse(localStorage.getItem('tc_tourneys')||'[]')
      const idx = tourneys.findIndex(t => t.id === _tournamentId)
      if (idx >= 0) { tourneys[idx].state = S; safeStore('tc_tourneys', tourneys) }
    } catch(e) {}
    return
  }
  try { await pb.collection('tournaments').update(_tournamentId, { state: S }) } catch(e) {}
}

async function sbLoad() {
  if (!_tournamentId) return false
  if (DEMO_MODE) {
    try {
      const tourneys = JSON.parse(localStorage.getItem('tc_tourneys')||'[]')
      const t = tourneys.find(x => x.id === _tournamentId)
      if (!t) return false
      const el = document.getElementById('tournament-title')
      if (el) el.textContent = t.name
      if (t.state) { S = { ...S, ...t.state }; return true }
      const regs = JSON.parse(localStorage.getItem('tc_regs')||'[]').filter(r => r.tournament_id === _tournamentId)
      S.herren    = regs.filter(r => r.gender === 'herr').map(r => r.display_name || r.user_id)
      S.damen     = regs.filter(r => r.gender === 'dame').map(r => r.display_name || r.user_id)
      S.numRounds = t.num_rounds || 5
      S.numCourts = t.num_courts || 6
      S.mode      = t.game_mode  || 'geloste_paarungen'
      return true
    } catch(e) { return false }
  }
  try {
    const data = await pb.collection('tournaments').getOne(_tournamentId, { fields: 'id,name,state,num_rounds,num_courts,game_mode' })
    const el = document.getElementById('tournament-title')
    if (el && data.name) el.textContent = data.name
    if (data.state) { S = { ...S, ...data.state }; return true }
    S.numRounds = data.num_rounds || 5
    S.numCourts = data.num_courts || 6
    S.mode      = data.game_mode  || 'geloste_paarungen'
    return false
  } catch(e) { return false }
}

// ════════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════════
let S = {
  mode:         'geloste_paarungen',
  step:         'setup',
  view:         'spieler',
  herren:       [],
  damen:        [],
  numRounds:    5,
  numCourts:    6,
  schedule:     [],   // rounds for non-KO modes
  currentRound: 0,
  loserSchedule:[],   // double KO losers bracket
  groups:       [],   // group phase groups
  koPhase:      null, // group phase KO rounds
  done:         false,
  pausedPlayers:[],
  useScores:    false, // track actual game scores (e.g. 6:3) instead of W/D/L only
}

const MIXED_MODES = new Set(['geloste_paarungen','americano'])
function isMixed()  { return MIXED_MODES.has(S.mode) }
function isKO()     { return S.mode==='einfaches_ko' || S.mode==='doppeltes_ko' }
function isGroup()  { return S.mode==='gruppenphase_ko' }
function isSwiss()  { return S.mode==='schweizer_system' }
function isRR()     { return S.mode==='round_robin' }
function allPlayers() { return [...S.herren, ...S.damen] }

const MODE_LABEL = {
  geloste_paarungen:'Balanced Draw', americano:'Americano',
  round_robin:'Jeder gegen jeden', gruppenphase_ko:'Gruppenphase + KO',
  einfaches_ko:'Einfaches KO', doppeltes_ko:'Doppeltes KO', schweizer_system:'Schweizer System'
}

function safeStore(key, value) {
  try { localStorage.setItem(key, JSON.stringify(value)); return true }
  catch(e) {
    if (e.name==='QuotaExceededError'||e.name==='NS_ERROR_DOM_QUOTA_REACHED'||e.code===22)
      toast('⚠️ Speicher voll! Bitte Backup erstellen und Browser-Cache leeren.')
    return false
  }
}

function getMembers() { try { return JSON.parse(localStorage.getItem('tc_members')||'[]') } catch { return [] } }

function save() {
  try { localStorage.setItem('donatocup_v4', JSON.stringify(S)) } catch(e) {}
  sbSave()
}
function load() { try { const d=localStorage.getItem('donatocup_v4'); if(d) S={...S,...JSON.parse(d)} } catch(e) {} }

// ════════════════════════════════════════════════
//  HELPERS
// ════════════════════════════════════════════════
function shuffle(a) { a=[...a]; for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]} return a }
function esc(s) { return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') }
function initials(n) { return (n||'?').trim().split(/\s+/).map(w=>w[0].toUpperCase()).slice(0,2).join('') }
function roundDone(r) { return r.matches.length>0 && r.matches.every(m=>m.result!==null) }
function roundHasSomeResult(r) { return r.matches.some(m=>m.result!==null) }
function courtLabel(i) { return Math.min(i+1, S.numCourts) }

function toast(msg) {
  const el=document.getElementById('toast'); if(!el) return
  el.textContent=msg
  el.classList.remove('opacity-0','translate-y-2'); el.classList.add('opacity-100','translate-y-0')
  clearTimeout(el._t)
  el._t=setTimeout(()=>{el.classList.add('opacity-0','translate-y-2');el.classList.remove('opacity-100','translate-y-0')},2800)
}

// ════════════════════════════════════════════════
//  DRAW: GELOSTE PAARUNGEN
// ════════════════════════════════════════════════
function drawGeloste(num) {
  const paused = new Set(S.pausedPlayers||[])
  const activeHerren = S.herren.filter(h=>!paused.has(h))
  const activeDamen  = S.damen.filter(d=>!paused.has(d))
  const pausedPairs  = [...paused].map(p=>({name:p,gender:S.herren.includes(p)?'herr':'dame'}))
  const n = Math.min(activeHerren.length, activeDamen.length)

  // Partner history: avoid repeated partnerships
  const pairCount = {}
  S.schedule.forEach(rnd => rnd.matches.forEach(m => {
    const k1=m.herr1+'|'+m.dame1, k2=m.herr2+'|'+m.dame2
    pairCount[k1]=(pairCount[k1]||0)+1; pairCount[k2]=(pairCount[k2]||0)+1
  }))

  // Opponent history: avoid repeated cross-team encounters
  const oppCount = {}
  const addOpp = (a,b) => { if(!oppCount[a]) oppCount[a]={}; oppCount[a][b]=(oppCount[a][b]||0)+1 }
  S.schedule.forEach(rnd => rnd.matches.forEach(m => {
    addOpp(m.herr1,m.herr2); addOpp(m.herr2,m.herr1)
    addOpp(m.herr1,m.dame2); addOpp(m.dame2,m.herr1)
    addOpp(m.dame1,m.herr2); addOpp(m.herr2,m.dame1)
    addOpp(m.dame1,m.dame2); addOpp(m.dame2,m.dame1)
  }))
  const opp = (a,b) => (oppCount[a]&&oppCount[a][b])||0

  // Step 1: Assign partners (minimize repeated partnerships)
  const herren = shuffle(activeHerren.slice(0,n))
  const availDamen = [...activeDamen.slice(0,n)]
  const pairs = []
  for(const herr of herren) {
    availDamen.sort((a,b)=>(pairCount[herr+'|'+a]||0)-(pairCount[herr+'|'+b]||0))
    const minC = pairCount[herr+'|'+availDamen[0]]||0
    const tied = availDamen.filter(d=>(pairCount[herr+'|'+d]||0)===minC)
    const dame = tied[Math.floor(Math.random()*tied.length)]
    pairs.push({herr,dame}); availDamen.splice(availDamen.indexOf(dame),1)
  }

  // Step 2: Split into active (on court) and bye pairs
  const courts = shuffle(Array.from({length:S.numCourts},(_,i)=>i+1))
  const maxM = Math.min(S.numCourts, Math.floor(pairs.length/2))
  const sp = shuffle(pairs)
  const active = sp.slice(0,maxM*2), byePairs = sp.slice(maxM*2)

  // Step 3: Match pairs as opponents (minimize repeated cross-team encounters)
  // Score = total prior encounters between any player on team A and any player on team B
  const matchScore = (t1,t2) =>
    opp(t1.herr,t2.herr)+opp(t1.herr,t2.dame)+opp(t1.dame,t2.herr)+opp(t1.dame,t2.dame)

  const unmatched = [...active]
  const matches = []
  let courtIdx = 0
  while(unmatched.length >= 2) {
    const pick = Math.floor(Math.random()*unmatched.length)
    const t1 = unmatched.splice(pick, 1)[0]
    const scored = unmatched.map((t2,i)=>({i,score:matchScore(t1,t2)}))
    scored.sort((a,b)=>a.score-b.score)
    const minS = scored[0].score
    const best = scored.filter(x=>x.score===minS)
    const chosen = best[Math.floor(Math.random()*best.length)]
    const t2 = unmatched.splice(chosen.i, 1)[0]
    matches.push({herr1:t1.herr,dame1:t1.dame,herr2:t2.herr,dame2:t2.dame,result:null,court:courts[courtIdx++]})
  }
  return {round:num,matches,byePairs,pausedPairs}
}

// ════════════════════════════════════════════════
//  DRAW: AMERICANO (minimiert Wiederholungen)
// ════════════════════════════════════════════════
function drawAmericano(num) {
  const paused = new Set(S.pausedPlayers||[])
  const activeHerren = S.herren.filter(h=>!paused.has(h))
  const activeDamen  = S.damen.filter(d=>!paused.has(d))
  const pausedPairs  = [...paused].map(p=>({name:p,gender:S.herren.includes(p)?'herr':'dame'}))
  const n = Math.min(activeHerren.length, activeDamen.length)
  const partnerCount = {}
  S.schedule.forEach(rnd => rnd.matches.forEach(m => {
    const k1=m.herr1+'|'+m.dame1, k2=m.herr2+'|'+m.dame2
    partnerCount[k1]=(partnerCount[k1]||0)+1; partnerCount[k2]=(partnerCount[k2]||0)+1
  }))
  const herren = shuffle(activeHerren.slice(0,n))
  const availDamen = [...activeDamen.slice(0,n)]
  const pairs = []
  for (const herr of herren) {
    availDamen.sort((a,b)=>(partnerCount[herr+'|'+a]||0)-(partnerCount[herr+'|'+b]||0))
    const minC = partnerCount[herr+'|'+availDamen[0]]||0
    const tied = availDamen.filter(d=>(partnerCount[herr+'|'+d]||0)===minC)
    const dame = tied[Math.floor(Math.random()*tied.length)]
    pairs.push({herr,dame}); availDamen.splice(availDamen.indexOf(dame),1)
  }
  const maxM = Math.min(S.numCourts, Math.floor(pairs.length/2))
  const sp = shuffle([...pairs])
  const active = sp.slice(0,maxM*2), byePairs = sp.slice(maxM*2)
  const courts = shuffle(Array.from({length:S.numCourts},(_,i)=>i+1))
  const matches = []
  for(let i=0;i<active.length;i+=2)
    matches.push({herr1:active[i].herr,dame1:active[i].dame,herr2:active[i+1].herr,dame2:active[i+1].dame,result:null,court:courts[Math.floor(i/2)]})
  return {round:num,matches,byePairs,pausedPairs}
}

// ════════════════════════════════════════════════
//  DRAW: JEDER GEGEN JEDEN (Round Robin)
// ════════════════════════════════════════════════
function generateRoundRobin() {
  const players = allPlayers()
  if (players.length < 2) return []
  const arr = players.length%2===1 ? [...players,null] : [...players]
  const rounds = []
  for (let r=0; r<arr.length-1; r++) {
    const matches=[], byes=[]
    for (let i=0; i<arr.length/2; i++) {
      const p1=arr[i], p2=arr[arr.length-1-i]
      if(p1!==null && p2!==null) matches.push({player1:p1,player2:p2,result:null,court:courtLabel(matches.length)})
      else byes.push(p1!==null?p1:p2)
    }
    rounds.push({round:r+1,matches,bye:byes[0]||null})
    arr.splice(1,0,arr.pop())
  }
  return rounds
}

// ════════════════════════════════════════════════
//  DRAW: SCHWEIZER SYSTEM
// ════════════════════════════════════════════════
function generateSwissRound(num) {
  const standings = calcIndividualStandings(S.schedule)
  const played = new Set()
  S.schedule.forEach(rnd => rnd.matches.forEach(m => played.add([m.player1,m.player2].sort().join('|'))))
  const unpaired = standings.map(p=>p.name)
  const matches=[], byes=[]
  while (unpaired.length >= 2) {
    const p1=unpaired.shift()
    let found=-1
    for(let i=0;i<unpaired.length;i++) {
      if(!played.has([p1,unpaired[i]].sort().join('|'))) { found=i; break }
    }
    if(found===-1) found=0
    matches.push({player1:p1,player2:unpaired.splice(found,1)[0],result:null,court:courtLabel(matches.length)})
  }
  if(unpaired.length===1) byes.push(unpaired[0])
  return {round:num,matches,bye:byes[0]||null}
}

// ════════════════════════════════════════════════
//  DRAW: EINFACHES KO
// ════════════════════════════════════════════════
function generateKO() {
  let players = shuffle(allPlayers())
  const size = Math.pow(2,Math.ceil(Math.log2(Math.max(players.length,2))))
  while(players.length<size) players.push(null)
  const matches=[]
  for(let i=0;i<players.length;i+=2) {
    const m={player1:players[i],player2:players[i+1],result:null,court:courtLabel(i/2)}
    if(m.player2===null) m.result='p1'
    if(m.player1===null) m.result='p2'
    matches.push(m)
  }
  return [{round:1,matches}]
}

function advanceKO(schedule) {
  const last=schedule[schedule.length-1]
  if(!last||!last.matches.every(m=>m.result!==null)) return
  const winners=last.matches.map(m=>m.result==='p1'?m.player1:m.player2).filter(Boolean)
  if(winners.length<2) return
  const matches=[]
  for(let i=0;i<winners.length;i+=2)
    if(i+1<winners.length) matches.push({player1:winners[i],player2:winners[i+1],result:null,court:courtLabel(i/2)})
  if(matches.length>0) schedule.push({round:schedule.length+1,matches})
}

// ════════════════════════════════════════════════
//  DRAW: DOPPELTES KO
// ════════════════════════════════════════════════
function generateDoubleKO() {
  S.loserSchedule=[]
  return generateKO()
}

function advanceDoubleKO() {
  const lastW=S.schedule[S.schedule.length-1]
  if(!lastW||!lastW.matches.every(m=>m.result!==null)) return
  const winners=lastW.matches.map(m=>m.result==='p1'?m.player1:m.player2).filter(Boolean)
  const losers =lastW.matches.map(m=>m.result==='p1'?m.player2:m.player1).filter(Boolean)
  if(!lastW._loserHandled && losers.length>=2) {
    const lm=[]
    for(let i=0;i<losers.length;i+=2)
      if(i+1<losers.length) lm.push({player1:losers[i],player2:losers[i+1],result:null,court:courtLabel(i/2)})
    if(lm.length) S.loserSchedule.push({round:S.loserSchedule.length+1,matches:lm})
    lastW._loserHandled=true
  }
  if(winners.length>=2) {
    const wm=[]
    for(let i=0;i<winners.length;i+=2)
      if(i+1<winners.length) wm.push({player1:winners[i],player2:winners[i+1],result:null,court:courtLabel(i/2)})
    if(wm.length) S.schedule.push({round:S.schedule.length+1,matches:wm})
  }
  // advance losers bracket too
  advanceKO(S.loserSchedule)
}

// ════════════════════════════════════════════════
//  DRAW: GRUPPENPHASE + KO
// ════════════════════════════════════════════════
function generateGruppenphase() {
  const players = shuffle(allPlayers())
  const numGroups = Math.max(2,Math.round(players.length/4))
  const groups = Array.from({length:numGroups},(_,i)=>({name:String.fromCharCode(65+i),players:[],schedule:[]}))
  players.forEach((p,i)=>groups[i%numGroups].players.push(p))
  groups.forEach(g=>{
    const arr=g.players.length%2===1?[...g.players,null]:[...g.players]
    for(let r=0;r<arr.length-1;r++) {
      const matches=[]
      for(let i=0;i<arr.length/2;i++) {
        const p1=arr[i],p2=arr[arr.length-1-i]
        if(p1!==null&&p2!==null) matches.push({player1:p1,player2:p2,result:null,court:courtLabel(matches.length)})
      }
      g.schedule.push({round:r+1,matches})
      arr.splice(1,0,arr.pop())
    }
  })
  return groups
}

function calcGroupStandings(group) {
  const map={}
  group.players.forEach(p=>{map[p]={name:p,pts:0,w:0,l:0,d:0,played:0}})
  group.schedule.forEach(rnd=>rnd.matches.forEach(m=>{
    if(!m.result) return
    const aw=(n,pts,w,d)=>{if(!map[n])return;map[n].played++;map[n].pts+=pts;if(w)map[n].w++;else if(d)map[n].d++;else map[n].l++}
    if(m.result==='p1'){aw(m.player1,2,true,false);aw(m.player2,0,false,false)}
    if(m.result==='p2'){aw(m.player2,2,true,false);aw(m.player1,0,false,false)}
    if(m.result==='draw'){aw(m.player1,1,false,true);aw(m.player2,1,false,true)}
  }))
  return Object.values(map).sort((a,b)=>b.pts-a.pts||b.w-a.w)
}

function groupsDone() { return (S.groups||[]).every(g=>g.schedule.every(r=>r.matches.every(m=>m.result!==null))) }

function generateKOFromGroups() {
  if(!groupsDone()) return
  const advancers=[]
  S.groups.forEach(g=>{
    const st=calcGroupStandings(g)
    const n=Math.max(1,Math.floor(st.length/2))
    advancers.push(...st.slice(0,n).map(p=>p.name))
  })
  let players=shuffle(advancers)
  const size=Math.pow(2,Math.ceil(Math.log2(Math.max(players.length,2))))
  while(players.length<size) players.push(null)
  const matches=[]
  for(let i=0;i<players.length;i+=2) {
    const m={player1:players[i],player2:players[i+1],result:null,court:courtLabel(i/2)}
    if(m.player2===null) m.result='p1'
    if(m.player1===null) m.result='p2'
    matches.push(m)
  }
  S.koPhase=[{round:1,matches}]
}

// ════════════════════════════════════════════════
//  STANDINGS
// ════════════════════════════════════════════════
function calcMixedStandings() {
  const map={}
  ;[...S.herren.map(n=>({name:n,gender:'herr'})),...S.damen.map(n=>({name:n,gender:'dame'}))]
    .forEach(p=>{map[p.name]={...p,pts:0,w:0,l:0,d:0,played:0,gW:0,gL:0}})
  S.schedule.forEach(rnd=>rnd.matches.forEach(m=>{
    if(!m.result) return
    const aw=(ns,pts,w,d,gW,gL)=>ns.forEach(n=>{if(!map[n])return;map[n].played++;map[n].pts+=pts;if(w)map[n].w++;else if(d)map[n].d++;else map[n].l++;map[n].gW+=gW||0;map[n].gL+=gL||0})
    const s1=m.score1??0, s2=m.score2??0
    if(m.result==='team1'){aw([m.herr1,m.dame1],2,true,false,s1,s2);aw([m.herr2,m.dame2],0,false,false,s2,s1)}
    if(m.result==='team2'){aw([m.herr2,m.dame2],2,true,false,s2,s1);aw([m.herr1,m.dame1],0,false,false,s1,s2)}
    if(m.result==='draw'){aw([m.herr1,m.dame1],1,false,true,s1,s2);aw([m.herr2,m.dame2],1,false,true,s2,s1)}
  }))
  return Object.values(map).sort((a,b)=>b.pts-a.pts||b.w-a.w||(b.gW-b.gL)-(a.gW-a.gL)||a.l-b.l)
}

function calcIndividualStandings(schedule) {
  const sc = schedule || S.schedule
  const map={}
  allPlayers().forEach(n=>{map[n]={name:n,gender:S.herren.includes(n)?'herr':'dame',pts:0,w:0,l:0,d:0,played:0,gW:0,gL:0}})
  sc.forEach(rnd=>rnd.matches.forEach(m=>{
    if(!m.result) return
    const aw=(n,pts,w,d,gW,gL)=>{if(!map[n])return;map[n].played++;map[n].pts+=pts;if(w)map[n].w++;else if(d)map[n].d++;else map[n].l++;map[n].gW+=gW||0;map[n].gL+=gL||0}
    const s1=m.score1??0, s2=m.score2??0
    if(m.result==='p1'){aw(m.player1,2,true,false,s1,s2);aw(m.player2,0,false,false,s2,s1)}
    if(m.result==='p2'){aw(m.player2,2,true,false,s2,s1);aw(m.player1,0,false,false,s1,s2)}
    if(m.result==='draw'){aw(m.player1,1,false,true,s1,s2);aw(m.player2,1,false,true,s2,s1)}
  }))
  return Object.values(map).sort((a,b)=>b.pts-a.pts||b.w-a.w||(b.gW-b.gL)-(a.gW-a.gL)||a.l-b.l)
}

function calcStandings() {
  if(isMixed()) return calcMixedStandings()
  if(isGroup()) {
    const allSched=(S.groups||[]).flatMap(g=>g.schedule)
    return calcIndividualStandings(allSched)
  }
  return calcIndividualStandings()
}

// ════════════════════════════════════════════════
//  SYNC (only for mixed modes)
// ════════════════════════════════════════════════
function syncSchedule() {
  if(S.step!=='tournament'||!isMixed()) return 0
  let redrawn=0
  const drawFn = S.mode==='americano' ? drawAmericano : drawGeloste
  S.schedule=S.schedule.map(rnd=>{
    if(roundHasSomeResult(rnd)) return rnd
    redrawn++; return drawFn(rnd.round)
  })
  if(S.mode!=='geloste_paarungen'){
    while(S.schedule.length<S.numRounds){S.schedule.push(drawFn(S.schedule.length+1));redrawn++}
  }
  if(S.mode!=='geloste_paarungen'){
    while(S.schedule.length>S.numRounds){
      const last=S.schedule[S.schedule.length-1]
      if(!roundHasSomeResult(last)) S.schedule.pop(); else break
    }
  }
  if(S.currentRound>=S.schedule.length) S.currentRound=S.schedule.length-1
  return redrawn
}

        }

    } else {
      pb.collection('tournaments').update(_tournamentId, { status: 'closed', placements }).catch(() => {})
    }

  save(); toast('Turnier beendet')
  if (mode === 'ceremony') { showCeremony(calcStandings()) } else { render() }
}

let _ceremonySteps=[], _ceremonyIdx=0, _confettiInterval=null

function showCeremony(standings) {
  _ceremonySteps=standings.slice(0,3).reverse()
  _ceremonyIdx=0
  document.getElementById('ceremony-overlay').classList.remove('hidden')
  renderCeremonyStep()
}

function renderCeremonyStep() {
  const total=_ceremonySteps.length
  const entry=_ceremonySteps[_ceremonyIdx]
  const place=total-_ceremonyIdx
  const medals={1:'🥇',2:'🥈',3:'🥉'}
  const isLast=_ceremonyIdx===total-1
  const placeColors={1:'text-yellow-300',2:'text-slate-300',3:'text-amber-600'}
  const medalSize=isLast?'text-[8rem]':'text-[6rem]'

  const lbl=document.getElementById('ceremony-place-label')
  const med=document.getElementById('ceremony-medal')
  const nm=document.getElementById('ceremony-name')
  const pts=document.getElementById('ceremony-pts')
  const btn=document.getElementById('ceremony-btn')

  function animEl(el,cls,text){el.className=cls;el.textContent=text||'';void el.offsetWidth;el.classList.add('ceremony-animate')}

  animEl(lbl, `font-headline font-black text-3xl tracking-widest uppercase mb-4 ${placeColors[place]||'text-white'}`, 'Platz '+place)
  animEl(med, `${medalSize} leading-none mb-4`, medals[place]||'')
  animEl(nm,  `font-headline font-black text-4xl md:text-5xl text-center px-4 mb-2 ${isLast?'text-yellow-200':'text-white'}`, entry?entry.name:'')
  animEl(pts, 'font-body text-white/50 text-lg mb-10', entry?`${entry.pts} Punkte · ${entry.w}S ${entry.d}U ${entry.l}N`:'')
  btn.textContent=isLast?'Fertig 🎉':'Weiter →'
  btn.className=`px-10 py-4 rounded-2xl font-headline font-black text-lg transition-all active:scale-95 ${isLast?'bg-yellow-400 text-black hover:bg-yellow-300':'bg-white/15 text-white hover:bg-white/25'}`

  if(isLast) startConfetti()
}

function ceremonyNext() {
  _ceremonyIdx++
  if(_ceremonyIdx>=_ceremonySteps.length) { closeCeremony() } else { renderCeremonyStep() }
}

  document.getElementById('ceremony-overlay').classList.add('hidden')

function startConfetti() {

function handleFileInput(e){const f=e.target.files[0];if(f)processImportFile(f)}
function handleDrop(e){e.preventDefault();const f=e.dataTransfer.files[0];if(f)processImportFile(f)}
function processImportFile(file) {
  const reader=new FileReader()
  reader.onload=function(e){
    try{
      const wb=XLSX.read(new Uint8Array(e.target.result),{type:'array'})
      const rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{header:1,defval:''})
      if(!rows.length) return showImportMsg('Datei ist leer.',true)
      const header=rows[0].map(c=>String(c).toLowerCase().trim())
      let herren=[],damen=[]
      const isHerr=s=>/herr|mann|male|m$/.test(s)
      const isDame=s=>/dame|frau|female|w$|f$/.test(s)
      const nameCol=header.findIndex(s=>/name|spieler/.test(s))
      const genderCol=header.findIndex(s=>/geschl|gender|sex/.test(s))
      if(nameCol>=0&&genderCol>=0){
        rows.slice(1).forEach(r=>{
          const name=String(r[nameCol]||'').trim(),g=String(r[genderCol]||'').trim().toLowerCase()
          if(!name)return
          if(/^[mh]/.test(g))herren.push(name);else if(/^[wfd]/.test(g))damen.push(name)
        })
      } else {
        const hIdx=header.findIndex(isHerr)>=0?header.findIndex(isHerr):0
        const dIdx=header.findIndex(isDame)>=0?header.findIndex(isDame):1
        const start=(header.some(isHerr)||header.some(isDame))?1:0
        rows.slice(start).forEach(r=>{
          const h=String(r[hIdx]||'').trim(),d=String(r[dIdx]||'').trim()
          if(h)herren.push(h);if(d)damen.push(d)
        })
      }
      if(!herren.length&&!damen.length) return showImportMsg('Keine Namen gefunden.',true)
      const addUniq=(list,names)=>names.forEach(n=>{if(n&&!list.includes(n))list.push(n)})
      addUniq(S.herren,herren);addUniq(S.damen,damen)
      const n=syncSchedule(); save()
      showImportMsg(herren.length+' Herren + '+damen.length+' Damen importiert')
      render()
      if(n>0) toast(n+' Runden neu ausgelost')
    }catch(err){showImportMsg('Fehler: '+err.message,true)}
  }
  reader.readAsArrayBuffer(file)
}
function showImportMsg(text,err=false){
  const el=document.getElementById('import-msg'); if(!el)return
  el.className=`flex items-center gap-2 text-sm px-4 py-3 rounded-xl mb-3 ${err?'bg-red-900/30 text-red-300 border border-red-500/20':'bg-secondary-fixed/10 text-secondary-fixed border border-secondary-fixed/20'}`
  el.innerHTML=`<span class="material-symbols-outlined text-base">${err?'warning':'check_circle'}</span><span class="font-body">${esc(text)}</span>`
  el.style.display='flex'
}

function renderPlan() {
  if(isKO())    return renderKOPlan()
  if(isGroup()) return renderGroupPlan()
  if(isSwiss()) return renderSwissPlan()
  if(isRR())    return renderRRPlan()
  return renderMixedPlan()
}

function renderMixedPlan() {
  const rnd=S.schedule[S.currentRound]
  const canRedraw=!roundHasSomeResult(rnd)
  const doneCnt=S.schedule.filter(roundDone).length
  const byePairs=rnd.byePairs||[]
  const isLastRound=S.currentRound===S.schedule.length-1
  const isGeloste=S.mode==='geloste_paarungen'
  const rndPaused=rnd.pausedPairs||[]
  const bye=byePairs.length||rndPaused.length?`<div class="rounded-xl px-4 py-3 bg-white/5 border border-white/10 text-white/50 text-sm font-body mb-3">
    <div class="flex flex-wrap gap-4">
      ${byePairs.length?`<div>
        <div class="text-[10px] font-headline font-bold uppercase tracking-widest text-white/30 mb-1.5 flex items-center gap-1.5">
          <span class="material-symbols-outlined text-xs">weekend</span>Freilos
        </div>
        <div class="flex flex-wrap gap-2">${byePairs.map(p=>`<span class="text-xs px-2 py-1 rounded-lg bg-white/5 font-body text-white/40">${esc(p.herr)} &amp; ${esc(p.dame)}</span>`).join('')}</div>
      </div>`:''}
      ${rndPaused.length?`<div>
        <div class="text-[10px] font-headline font-bold uppercase tracking-widest text-yellow-500/50 mb-1.5 flex items-center gap-1.5">
          <span class="material-symbols-outlined text-xs">pause_circle</span>Pause
        </div>
        <div class="flex flex-wrap gap-2">${rndPaused.map(p=>`<span class="text-xs px-2 py-1 rounded-lg bg-yellow-900/20 border border-yellow-500/20 font-body text-yellow-300/60">${esc(p.name)}</span>`).join('')}</div>
      </div>`:''}
    </div>
  </div>`:''
  return `

    : ''

function renderBracket(schedule, title, setFn) {
  if(!schedule.length) return ''
  const R=schedule.length
  const N=schedule[0].matches.length  // first round match count
  const CARD_H=72, SLOT_H=88, COL_W=168, CONN_W=40
  const totalH=Math.max(N,1)*SLOT_H
  const totalW=R*(COL_W+CONN_W)-CONN_W

  const bracketRoundName=(rIdx)=>{
    const rem=R-1-rIdx
    if(rem===0) return 'Finale'
    if(rem===1&&R>2) return 'Halbfinale'
    if(rem===2&&R>3) return 'Viertelfinale'
    return `Runde ${schedule[rIdx].round}`
  }

  // Generate match card HTML (absolutely positioned)
  let cardsHtml=''
  schedule.forEach((rnd,rIdx)=>{
    const slotH=Math.pow(2,rIdx)*SLOT_H
    const colX=rIdx*(COL_W+CONN_W)
    rnd.matches.forEach((m,mIdx)=>{
      const cardTop=mIdx*slotH+(slotH-CARD_H)/2
      const res=m.result, w1=res==='p1', w2=res==='p2'
      const p1=esc(m.player1||'TBD'), p2=esc(m.player2||'TBD')
      const isH1=S.herren.includes(m.player1), isH2=S.herren.includes(m.player2)
      const isDone=!S.done&&m.player1&&m.player2
      cardsHtml+=`<div style="position:absolute;left:${colX}px;top:${Math.round(cardTop)}px;width:${COL_W}px">
        <div class="rounded-xl bg-black/30 border ${res?'border-secondary-fixed/25':'border-white/8'} overflow-hidden">
          <div ${isDone?`onclick="${setFn(rIdx,mIdx,'p1')}" class="flex items-center gap-2 px-3 py-2 cursor-pointer hover:bg-white/5 transition-colors border-b border-white/5 ${w1?'bg-secondary-fixed/10':''}"`:
            `class="flex items-center gap-2 px-3 py-2 border-b border-white/5 ${w1?'bg-secondary-fixed/10':''}"`}>
            <span class="material-symbols-outlined text-xs ${isH1?'text-blue-400':'text-pink-400'}">person</span>
            <span class="font-body text-sm font-medium flex-1 truncate ${w1?'text-secondary-fixed':'text-white/80'}">${p1}</span>
            ${w1?'<span class="material-symbols-outlined text-xs text-secondary-fixed">check</span>':''}
          </div>
          <div ${isDone?`onclick="${setFn(rIdx,mIdx,'p2')}" class="flex items-center gap-2 px-3 py-2 cursor-pointer hover:bg-white/5 transition-colors ${w2?'bg-secondary-fixed/10':''}"`:`class="flex items-center gap-2 px-3 py-2 ${w2?'bg-secondary-fixed/10':''}"`}>
            <span class="material-symbols-outlined text-xs ${isH2?'text-blue-400':'text-pink-400'}">person</span>
            <span class="font-body text-sm font-medium flex-1 truncate ${w2?'text-secondary-fixed':'text-white/80'}">${p2}</span>
            ${w2?'<span class="material-symbols-outlined text-xs text-secondary-fixed">check</span>':''}
          </div>
        </div>
      </div>`
    })
  })

  // Round labels
  let labelsHtml=''
  for(let rIdx=0;rIdx<R;rIdx++) {
    const colX=rIdx*(COL_W+CONN_W)
    labelsHtml+=`<div style="position:absolute;left:${colX}px;top:0;width:${COL_W}px" class="text-center">
      <span class="text-[10px] font-headline font-bold uppercase tracking-widest text-white/35">${bracketRoundName(rIdx)}</span>
    </div>`
  }

  // SVG connecting lines
  let svgLines=''
  for(let rIdx=0;rIdx<R-1;rIdx++) {
    const srcSlotH=Math.pow(2,rIdx)*SLOT_H
    const dstSlotH=srcSlotH*2
    const srcX=rIdx*(COL_W+CONN_W)+COL_W
    const dstX=(rIdx+1)*(COL_W+CONN_W)
    const midX=Math.round(srcX+CONN_W/2)
    const numSrc=schedule[rIdx].matches.length
    for(let i=0;i<numSrc;i+=2) {
      if(i+1>=numSrc) break
      const srcY1=Math.round(i*srcSlotH+srcSlotH/2)
      const srcY2=Math.round((i+1)*srcSlotH+srcSlotH/2)
      const dstY=Math.round((srcY1+srcY2)/2)
      svgLines+=`<line x1="${srcX}" y1="${srcY1}" x2="${midX}" y2="${srcY1}" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
        <line x1="${srcX}" y1="${srcY2}" x2="${midX}" y2="${srcY2}" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
        <line x1="${midX}" y1="${srcY1}" x2="${midX}" y2="${srcY2}" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
        <line x1="${midX}" y1="${dstY}" x2="${dstX}" y2="${dstY}" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>`
    }
  }

  const finalRound=schedule[R-1]
  const finalWinner = roundDone(finalRound)&&finalRound.matches.length===1
    ? (finalRound.matches[0].result==='p1'?finalRound.matches[0].player1:finalRound.matches[0].player2)
    : null
  const winnerBanner = finalWinner ? `<div class="mt-5 flex items-center justify-center gap-3 px-5 py-4 rounded-2xl bg-secondary-fixed/15 border border-secondary-fixed/30">
    <span class="text-2xl">🏆</span>
    <div>
      <div class="text-[10px] font-headline uppercase tracking-widest text-secondary-fixed/70 mb-0.5">Sieger</div>
      <div class="font-headline font-bold text-xl text-secondary-fixed">${esc(finalWinner)}</div>
    </div>
  </div>`:''

  return `
    <h2 class="text-lg font-headline font-bold text-white mb-1 flex items-center gap-2">
      <span class="material-symbols-outlined text-base text-secondary-fixed">trophy</span>${title}
    </h2>
    <div class="overflow-x-auto pb-4 scrollbar-hide">
      <div style="position:relative;width:${totalW}px;height:${totalH+28}px">
        <div style="position:relative;height:20px;width:${totalW}px;margin-bottom:8px">${labelsHtml}</div>
        <div style="position:relative;width:${totalW}px;height:${totalH}px">
          <svg style="position:absolute;inset:0;overflow:visible" width="${totalW}" height="${totalH}">${svgLines}</svg>
          ${cardsHtml}
        </div>
      </div>
    </div>
    ${winnerBanner}`
}

function backupTournament() {
  const title = document.getElementById('tournament-title')?.textContent || 'Turnier'
  const data = JSON.stringify({_backup:true, _version:1, _title:title, state:S}, null, 2)
  const a = document.createElement('a')
  a.href = 'data:application/json;charset=utf-8,' + encodeURIComponent(data)
  a.download = title.replace(/[^a-z0-9äöü ]/gi,'_') + '_Backup.json'
  a.click()
  localStorage.setItem('tc_last_backup', new Date().toISOString())
  toast('Backup heruntergeladen')
}

function importBackup(input) {
  const file = input.files[0]; if(!file) return
  const reader = new FileReader()
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result)
      if(!data._backup) { toast('❌ Keine gültige Backup-Datei'); input.value=''; return }
      if(!data.state) { toast('❌ Backup enthält keinen Spielstand'); input.value=''; return }
      if(data.state.schedule && !Array.isArray(data.state.schedule)) { toast('❌ Backup-Format ungültig'); input.value=''; return }
      const KNOWN_MODES = ['geloste_paarungen','americano','round_robin','gruppenphase_ko','einfaches_ko','doppeltes_ko','schweizer_system']
      if(data.state.mode && !KNOWN_MODES.includes(data.state.mode)) { toast('❌ Unbekannter Spielmodus im Backup'); input.value=''; return }
      const curTitle = document.getElementById('tournament-title')?.textContent || ''
      const backupTitle = data._title || ''
      let msg = 'Aktuellen Stand überschreiben und Backup wiederherstellen?'
      if(backupTitle && curTitle && backupTitle !== curTitle)
        msg = `Das Backup gehört zu "${backupTitle}", dieses Turnier heißt "${curTitle}".\n\nTrotzdem laden?`
      if(!confirm(msg)) { input.value=''; return }
      S = {...S, ...data.state}
      save(); render()
      toast('✓ Backup wiederhergestellt')
    } catch(err) { toast('❌ Fehler: ' + err.message) }
    input.value = ''
  }
  reader.readAsText(file)
}

function exportTournament() {
  const wb = XLSX.utils.book_new()
  const title = document.getElementById('tournament-title')?.textContent || 'Turnier'

  // Sheet 1: Tabelle
  const standings = calcStandings()
  const tCols = ['Platz','Name','Punkte','Spiele','Siege','Unentschieden','Niederlagen']
  if(S.useScores) tCols.push('Games gewonnen','Games verloren')
  const tRows = [tCols]
  standings.forEach((s,i) => {
    const row = [i+1, s.name, s.pts, s.played, s.w, s.d||0, s.l]
    if(S.useScores) row.push(s.gW||0, s.gL||0)
    tRows.push(row)
  })
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(tRows), 'Tabelle')

  // Sheet 2: Alle Runden (mixed modes)
  if(isMixed() && S.schedule.length) {
    const mCols = ['Runde','Platz','Herr 1','Dame 1','Ergebnis','Herr 2','Dame 2']
    if(S.useScores) mCols.push('Score T1','Score T2')
    const mRows = [mCols]
    S.schedule.forEach(rnd => rnd.matches.forEach(m => {
      const res = m.result==='team1'?'T1 gewinnt':m.result==='team2'?'T2 gewinnt':m.result==='draw'?'Unentschieden':''
      const row = [rnd.round, m.court||'', m.herr1, m.dame1, res, m.herr2, m.dame2]
      if(S.useScores) row.push(m.score1??'', m.score2??'')
      mRows.push(row)
    }))
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(mRows), 'Spielplan')
  }

  // Sheet 2: Alle Runden (individual modes)
  if(!isMixed() && !isGroup() && S.schedule.length) {
    const mCols = ['Runde','Spieler 1','Spieler 2','Ergebnis']
    if(S.useScores) mCols.push('Score 1','Score 2')
    const mRows = [mCols]
    S.schedule.forEach(rnd => {
      if(rnd.bye) mRows.push([rnd.round, rnd.bye, 'Freilos', ''])
      rnd.matches.forEach(m => {
        const res = m.result==='p1'?m.player1+' gewinnt':m.result==='p2'?m.player2+' gewinnt':m.result==='draw'?'Unentschieden':''
        const row = [rnd.round, m.player1||'TBD', m.player2||'TBD', res]
        if(S.useScores) row.push(m.score1??'', m.score2??'')
        mRows.push(row)
      })
    })
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(mRows), 'Spielplan')
  }

  // Sheet 3: Gruppenphase
  if(isGroup() && S.groups.length) {
    const gRows = [['Gruppe','Runde','Spieler 1','Spieler 2','Ergebnis']]
    S.groups.forEach(g => g.schedule.forEach(rnd => rnd.matches.forEach(m => {
      const res = m.result==='p1'?m.player1+' gewinnt':m.result==='p2'?m.player2+' gewinnt':m.result==='draw'?'Unentschieden':''
      gRows.push([g.name, rnd.round, m.player1||'TBD', m.player2||'TBD', res])
    })))
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(gRows), 'Gruppen')
  }

  XLSX.writeFile(wb, title.replace(/[^a-z0-9äöü ]/gi,'_') + '_Ergebnisse.xlsx')
  toast('Export heruntergeladen')
}

        ${S.done?'': `<label class="flex items-center gap-1.5 px-3.5 py-2 rounded-xl font-headline font-bold text-xs bg-white/10 text-white/60 hover:bg-white/15 transition-colors cursor-pointer no-print">
          <span class="material-symbols-outlined text-sm">upload</span>Wiederherstellen
          <input type="file" accept=".json" class="sr-only" onchange="importBackup(this)"/>
        </label>`}
      </div>
    </div>
    ${!rows.length||rows.every(r=>r.played===0)
      ?`<div class="text-center py-16 text-white/30 font-body"><span class="material-symbols-outlined text-4xl block mb-3">leaderboard</span>Noch keine Ergebnisse</div>`
      :`<div class="space-y-2">${rows.map((s,i)=>{
        const gameDiff=s.gW||s.gL?(s.gW>s.gL?'+':'')+(s.gW-s.gL):'';
        return `
        <div class="rounded-xl p-4 bg-black/20 border border-white/5 flex items-center gap-3 ${accents[i]||''} hover:bg-white/5 transition-colors">
          <div class="text-lg w-8 text-center flex-shrink-0">${medals[i]||`<span class="font-headline font-bold text-white/30 text-sm">${i+1}</span>`}</div>
          <div class="w-10 h-10 rounded-full ${s.gender==='herr'?'bg-blue-500':'bg-pink-500'} flex items-center justify-center text-sm font-headline font-bold text-white flex-shrink-0">${initials(s.name)}</div>
          <div class="flex-1 min-w-0">
            <div class="font-headline font-bold text-white text-sm md:text-base truncate">${esc(s.name)}</div>
            <div class="text-xs text-white/40 font-body mt-0.5">${s.played} Sp · ${s.w}S${s.d>0?' '+s.d+'U':''} · ${s.l}N${S.useScores&&(s.gW||s.gL)?` · <span class="text-secondary-fixed/70">${s.gW}:${s.gL} G</span>`:''}</div>
          </div>
          <div class="hidden sm:block flex-1 max-w-24 mx-3">
            <div class="h-1.5 bg-white/10 rounded-full overflow-hidden">
              <div class="h-full bg-secondary-fixed rounded-full" style="width:${Math.round(s.pts/maxPts*100)}%"></div>
            </div>
          </div>
          <div class="text-right flex-shrink-0 min-w-[3rem]">
            <div class="font-headline font-bold text-lg ${i===0?'text-secondary-fixed':'text-white'}">${s.pts}</div>
            <div class="text-[10px] text-white/25 font-body uppercase">Pkt</div>
          </div>
        </div>`}).join('')}</div>`}
  `
}

// ════════════════════════════════════════════════
//  RENDER: PAARUNGEN
// ════════════════════════════════════════════════
function renderPaarungen() {
  const schedule = isGroup() ? (S.groups||[]).flatMap(g=>g.schedule) : S.schedule
  const withMap={}, vsMap={}
  allPlayers().forEach(p=>{withMap[p]={};vsMap[p]={}})
  schedule.forEach(rnd=>rnd.matches.forEach(m=>{
    const inc=(map,a,b)=>{if(!a||!b)return;map[a]=map[a]||{};map[b]=map[b]||{};map[a][b]=(map[a][b]||0)+1;map[b][a]=(map[b][a]||0)+1}
    if(isMixed()) {
      inc(withMap,m.herr1,m.dame1); inc(withMap,m.herr2,m.dame2)
      ;[m.herr1,m.dame1].forEach(p1=>[m.herr2,m.dame2].forEach(p2=>inc(vsMap,p1,p2)))
    } else {
      inc(vsMap,m.player1,m.player2)
    }
  }))
  const players=allPlayers().map(n=>({name:n,gender:S.herren.includes(n)?'herr':'dame'}))
  const sorted=obj=>Object.entries(obj||{}).sort((a,b)=>b[1]-a[1])
  const pills=entries=>entries.map(([name,count])=>{
    const isH=S.herren.includes(name)
    return `<span class="inline-flex items-center gap-1 px-2.5 py-1 rounded-lg bg-white/5 border border-white/5 text-xs font-body">
      <span class="material-symbols-outlined text-xs ${isH?'text-blue-400':'text-pink-400'}">person</span>
      <span class="text-white/70">${esc(name)}</span>
      <span class="text-white/25 font-headline font-bold">×${count}</span>
    </span>`
  }).join('')
  return `
    <h2 class="text-2xl font-headline font-bold text-white mb-5">Paarungen</h2>
    <div class="space-y-3">${players.map(p=>{
      const partners=sorted(withMap[p.name])
      const opponents=sorted(vsMap[p.name])
      const total=opponents.reduce((s,[,c])=>s+c,0)
      return `<div class="rounded-xl bg-black/20 border border-white/5 overflow-hidden">
        <div class="flex items-center gap-3 px-4 py-3 border-b border-white/5">
          <div class="w-9 h-9 rounded-full ${p.gender==='herr'?'bg-blue-500':'bg-pink-500'} flex items-center justify-center text-xs font-headline font-bold text-white">${initials(p.name)}</div>
          <span class="font-headline font-bold text-white flex-1">${esc(p.name)}</span>
          <span class="text-xs text-white/30 font-body">${total} Spiel${total!==1?'e':''}</span>
        </div>
        <div class="px-4 py-3 space-y-3">
          ${isMixed()?`<div>
            <div class="text-[10px] font-headline uppercase tracking-widest text-white/25 mb-2 flex items-center gap-1.5">
              <span class="material-symbols-outlined text-xs">handshake</span>Partner
            </div>
            <div class="flex flex-wrap gap-1.5">${partners.length?pills(partners):'<span class="text-xs text-white/20 font-body">–</span>'}</div>
          </div>`:''}
          <div>
            <div class="text-[10px] font-headline uppercase tracking-widest text-white/25 mb-2 flex items-center gap-1.5">
              <span class="material-symbols-outlined text-xs">swords</span>Gegner
            </div>
            <div class="flex flex-wrap gap-1.5">${opponents.length?pills(opponents):'<span class="text-xs text-white/20 font-body">–</span>'}</div>
          </div>
        </div>
      </div>`
    }).join('')}</div>`
}

// ════════════════════════════════════════════════
//  CHROME
// ════════════════════════════════════════════════
function updateChrome() {
  const resetBtn=document.querySelector('button[onclick="resetTournament()"]')
  if(resetBtn) resetBtn.style.display=S.done?'none':''
  const badge=document.getElementById('header-badge')
  if(badge) {
    if(S.done) { badge.textContent='Abgeschlossen'; badge.classList.remove('hidden') }
    else if(S.step==='tournament') {
      let done=0, total=0
      if(isGroup()&&!S.koPhase) {
        (S.groups||[]).forEach(g=>g.schedule.forEach(r=>{total+=r.matches.length;done+=r.matches.filter(m=>m.result).length}))
        badge.textContent=done+'/'+total+' Matches'
      } else if(isGroup()&&S.koPhase) {
        done=S.koPhase.filter(roundDone).length; total=S.koPhase.length
        badge.textContent=done+'/'+total+' KO-Runden'
      } else if(isKO()) {
        done=S.schedule.filter(roundDone).length; total=S.schedule.length
        badge.textContent=done+'/'+total+' Runden'
      } else {
        done=S.schedule.filter(roundDone).length; total=S.schedule.length
        badge.textContent=done+'/'+total+' Runden'
      }
      badge.classList.remove('hidden')
    } else badge.classList.add('hidden')
  }
  const activeView=S.step==='setup'?'spieler':S.view
  const inT=S.step==='tournament'
  ;['spieler','plan','tabelle','paarungen'].forEach(v=>{
    const isActive=activeView===v
    const disabled=!inT&&(v==='plan'||v==='tabelle'||v==='paarungen')
    const bn=document.getElementById('bnav-'+v)
    if(bn) bn.className=`flex flex-col items-center px-5 py-2 rounded-xl transition-all active:scale-90 ${isActive?'bg-secondary-fixed text-on-secondary-fixed':disabled?'text-white/20 cursor-not-allowed':'text-emerald-100/50 hover:text-white'}`
    const hn=document.getElementById('hnav-'+v)
    if(hn) hn.className=`px-4 py-2 rounded-xl font-headline font-bold text-sm transition-all ${isActive?'text-secondary-fixed bg-white/10':disabled?'text-white/20 cursor-not-allowed':'text-white/50 hover:text-white hover:bg-white/10'}`
  })
}

function render() {
  const app=document.getElementById('app'); if(!app) return
  const view=S.step==='setup'?'spieler':S.view
  if(view==='spieler')        app.innerHTML=renderSpieler()
  else if(view==='plan')      app.innerHTML=renderPlan()
  else if(view==='tabelle')   app.innerHTML=renderTabelle()
  else if(view==='paarungen') app.innerHTML=renderPaarungen()
  updateChrome()
}

// ════════════════════════════════════════════════
//  MEMBER AUTOCOMPLETE
// ════════════════════════════════════════════════
function updateSuggest(gender) {
  const inp=document.getElementById('input-'+gender)
  const box=document.getElementById('suggest-'+gender)
  if(!inp||!box) return
  const query=inp.value.trim().toLowerCase()
  const current=gender==='herr'?S.herren:S.damen
  const suggestions=getMembers()
    .filter(m=>m.gender===gender&&!current.includes(m.name)&&(!query||m.name.toLowerCase().includes(query)))
    .slice(0,6)
  if(!suggestions.length){box.classList.add('hidden');return}
  box.classList.remove('hidden')
  box.innerHTML=suggestions.map(m=>`<button type="button" onmousedown="selectSuggest('${gender}',${JSON.stringify(m.name)})"
    class="w-full text-left px-3 py-2.5 text-sm font-body text-white/80 hover:bg-white/10 transition-colors border-b border-white/5 last:border-0">${esc(m.name)}</button>`).join('')
}

function closeSuggest(gender) {
  const box=document.getElementById('suggest-'+gender)
  if(box) box.classList.add('hidden')
}

function selectSuggest(gender, name) {
  const inp=document.getElementById('input-'+gender)
  if(inp) inp.value=name
  closeSuggest(gender)
  addPlayer(gender)
}

function quickAdd(gender, name) {
  if(gender==='herr') S.herren.push(name); else S.damen.push(name)
  const n=syncSchedule(); save(); render()
  if(n>0) toast(n+' Runde'+(n>1?'n':'')+' neu ausgelost')
}

// ════════════════════════════════════════════════
//  QR CODE – ANZEIGETAFEL
// ════════════════════════════════════════════════
function showDisplayQR() {
  const base=location.href.replace(/tournament\.html.*$/,'')
  const url=base+'display/?t='+(_tournamentId||'')
  const qrSrc='https://api.qrserver.com/v1/create-qr-code/?size=220x220&data='+encodeURIComponent(url)+'&bgcolor=ffffff&color=0a1f0b&margin=10'
  document.getElementById('display-qr-img').src=qrSrc
  document.getElementById('display-qr-url').textContent=url
  document.getElementById('modal-display-qr').showModal()
}

function copyDisplayUrl() {
  const url=document.getElementById('display-qr-url').textContent
  navigator.clipboard.writeText(url).then(()=>toast('URL kopiert!')).catch(()=>toast('Kopieren nicht möglich'))
}

// Boot
initAuth().then(async ok => {
  if(!ok) return
  const loaded=await sbLoad()
  if(!loaded) load()
  render()
})
</script>
