<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>TC Bad Soden-Salmünster – Turniere</title>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;500;600;700;800;900&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms"></script>
<script src="https://cdn.jsdelivr.net/npm/pocketbase/dist/pocketbase.umd.js"></script>
<script src="config.js"></script>
<script>
tailwind.config = {
  darkMode:"class",
  theme:{extend:{
    colors:{
      "primary":"#003908","primary-container":"#115217",
      "on-primary-container":"#83c57c",
      "secondary-fixed":"#dbed50","on-secondary-fixed":"#1a1e00",
      "secondary-fixed-dim":"#bfd035",
      "outline-variant":"#c0c9bb","error":"#ba1a1a"
    },
    fontFamily:{headline:["Lexend","sans-serif"],body:["Plus Jakarta Sans","sans-serif"]},
    borderRadius:{DEFAULT:"0.125rem",lg:"0.25rem",xl:"0.5rem","2xl":"0.75rem",full:"9999px"}
  }}
}
</script>
<style>
  body{font-family:'Plus Jakarta Sans',sans-serif;background-color:#0a1f0b;color:#fff;min-height:100vh;}
  .font-headline,h1,h2,h3{font-family:'Lexend',sans-serif;}
  .material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;vertical-align:middle;user-select:none;}
  .bg-hero{background:radial-gradient(ellipse 80% 60% at 50% -10%, rgba(219,237,80,.12) 0%, transparent 60%), linear-gradient(180deg, #0a1f0b 0%, #115217 50%, #0a1f0b 100%);}
  input:-webkit-autofill{-webkit-box-shadow:0 0 0 30px #1a2e1b inset!important;-webkit-text-fill-color:#fff!important;}
</style>
</head>
<body class="bg-hero">

<!-- ── Noise overlay ─── -->
<div class="fixed inset-0 opacity-[0.03] pointer-events-none" style="background-image:url('data:image/svg+xml,%3Csvg viewBox=%220 0 256 256%22 xmlns=%22http://www.w3.org/2000/svg%22%3E%3Cfilter id=%22n%22%3E%3CfeTurbulence type=%22fractalNoise%22 baseFrequency=%220.9%22 numOctaves=%224%22/%3E%3C/filter%3E%3Crect width=%22100%25%22 height=%22100%25%22 filter=%22url(%23n)%22/%3E%3C/svg%3E');background-size:200px;"></div>

<div class="relative min-h-screen flex flex-col items-center justify-center px-4 py-12">

  <!-- ── Logo ── -->
  <div class="flex flex-col items-center mb-10 select-none">
    <div class="mb-3 drop-shadow-[0_0_24px_rgba(219,237,80,.25)]">
      <img src="logo.png" alt="TC Bad Soden-Salmünster" class="w-28 h-28 object-contain"/>
    </div>
    <div class="text-2xl font-black tracking-tight font-headline text-white leading-tight text-center">TC Bad Soden-<br>Salmünster</div>
    <div class="text-xs text-secondary-fixed font-headline uppercase tracking-[.25em] mt-1.5 opacity-80">Turnierplaner</div>
  </div>

  <!-- ── Card ── -->
  <div class="w-full max-w-sm">
    <!-- Tabs -->
    <div class="flex bg-black/30 rounded-2xl p-1 mb-5 border border-white/5">
      <button id="tab-login" onclick="switchTab('login')"
        class="flex-1 py-2.5 rounded-xl font-headline font-bold text-sm transition-all">Anmelden</button>
      <button id="tab-register" onclick="switchTab('register')"
        class="flex-1 py-2.5 rounded-xl font-headline font-bold text-sm transition-all">Registrieren</button>
    </div>

    <!-- Message banner -->
    <div id="msg" class="hidden mb-4 px-4 py-3 rounded-xl text-sm font-body flex items-center gap-2"></div>

    <!-- Login form -->
    <form id="form-login" class="space-y-3" onsubmit="handleLogin(event)">
      <div>
        <label class="block text-xs font-headline font-bold uppercase tracking-widest text-white/40 mb-1.5">E-Mail</label>
        <input type="email" id="login-email" required placeholder="deine@email.de"
          class="w-full bg-white/8 border border-white/10 text-white placeholder-white/20 rounded-xl px-4 py-3 text-sm font-body focus:outline-none focus:border-secondary-fixed/50 transition-colors"/>
      </div>
      <div>
        <label class="block text-xs font-headline font-bold uppercase tracking-widest text-white/40 mb-1.5">Passwort</label>
        <div class="relative">
          <input type="password" id="login-pw" required placeholder="••••••••"
            class="w-full bg-white/8 border border-white/10 text-white placeholder-white/20 rounded-xl px-4 py-3 text-sm font-body focus:outline-none focus:border-secondary-fixed/50 transition-colors pr-11"/>
          <button type="button" onclick="togglePw('login-pw',this)" class="absolute right-3 top-1/2 -translate-y-1/2 text-white/30 hover:text-white/60 transition-colors">
            <span class="material-symbols-outlined text-base">visibility</span>
          </button>
        </div>
      </div>
      <button type="submit" id="btn-login"
        class="w-full py-3 rounded-xl font-headline font-bold text-sm bg-secondary-fixed text-on-secondary-fixed hover:bg-secondary-fixed-dim transition-colors flex items-center justify-center gap-2 mt-1">
        <span class="material-symbols-outlined text-base">login</span>Anmelden
      </button>
    </form>

    <!-- Register form -->
    <form id="form-register" class="hidden space-y-3" onsubmit="handleRegister(event)">
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="block text-xs font-headline font-bold uppercase tracking-widest text-white/40 mb-1.5">Vorname</label>
          <input type="text" id="reg-first" required placeholder="Anna"
            class="w-full bg-white/8 border border-white/10 text-white placeholder-white/20 rounded-xl px-4 py-3 text-sm font-body focus:outline-none focus:border-secondary-fixed/50 transition-colors"/>
        </div>
        <div>
          <label class="block text-xs font-headline font-bold uppercase tracking-widest text-white/40 mb-1.5">Nachname</label>
          <input type="text" id="reg-last" required placeholder="Müller"
            class="w-full bg-white/8 border border-white/10 text-white placeholder-white/20 rounded-xl px-4 py-3 text-sm font-body focus:outline-none focus:border-secondary-fixed/50 transition-colors"/>
        </div>
      </div>
      <div>
        <label class="block text-xs font-headline font-bold uppercase tracking-widest text-white/40 mb-1.5">E-Mail</label>
        <input type="email" id="reg-email" required placeholder="deine@email.de"
          class="w-full bg-white/8 border border-white/10 text-white placeholder-white/20 rounded-xl px-4 py-3 text-sm font-body focus:outline-none focus:border-secondary-fixed/50 transition-colors"/>
      </div>
      <div>
        <label class="block text-xs font-headline font-bold uppercase tracking-widest text-white/40 mb-1.5">Passwort</label>
        <div class="relative">
          <input type="password" id="reg-pw" required placeholder="min. 8 Zeichen" minlength="8"
            class="w-full bg-white/8 border border-white/10 text-white placeholder-white/20 rounded-xl px-4 py-3 text-sm font-body focus:outline-none focus:border-secondary-fixed/50 transition-colors pr-11"/>
          <button type="button" onclick="togglePw('reg-pw',this)" class="absolute right-3 top-1/2 -translate-y-1/2 text-white/30 hover:text-white/60 transition-colors">
            <span class="material-symbols-outlined text-base">visibility</span>
          </button>
        </div>
      </div>
      <div>
        <label class="block text-xs font-headline font-bold uppercase tracking-widest text-white/40 mb-2">Geschlecht</label>
        <div class="grid grid-cols-2 gap-2">
          <label class="flex items-center gap-2.5 px-3 py-2.5 rounded-xl bg-white/5 border border-white/10 cursor-pointer hover:bg-white/10 transition-colors has-[:checked]:border-secondary-fixed/50 has-[:checked]:bg-secondary-fixed/10">
            <input type="radio" name="gender" value="herr" class="sr-only" required/>
            <span class="material-symbols-outlined text-blue-400 text-base">person</span>
            <span class="text-sm font-body font-medium">Herr</span>
          </label>
          <label class="flex items-center gap-2.5 px-3 py-2.5 rounded-xl bg-white/5 border border-white/10 cursor-pointer hover:bg-white/10 transition-colors has-[:checked]:border-secondary-fixed/50 has-[:checked]:bg-secondary-fixed/10">
            <input type="radio" name="gender" value="dame" class="sr-only"/>
            <span class="material-symbols-outlined text-pink-400 text-base">person</span>
            <span class="text-sm font-body font-medium">Dame</span>
          </label>
        </div>
      </div>
      <button type="submit" id="btn-register"
        class="w-full py-3 rounded-xl font-headline font-bold text-sm bg-secondary-fixed text-on-secondary-fixed hover:bg-secondary-fixed-dim transition-colors flex items-center justify-center gap-2 mt-1">
        <span class="material-symbols-outlined text-base">how_to_reg</span>Konto erstellen
      </button>
    </form>
  </div>

  <!-- ── Footer ── -->
  <p class="text-white/20 text-xs font-body mt-10 text-center">
    Mit der Registrierung stimmst du der Nutzung deiner Daten für den Turnierbetrieb beim TC Bad Soden-Salmünster zu.
  </p>
</div>

<script>
// ── PocketBase ──────────────────────────────────────────────
const POCKETBASE_URL = (typeof CONFIG !== 'undefined' ? CONFIG.POCKETBASE_URL : null) || 'YOUR_POCKETBASE_URL'
const DEMO_MODE = POCKETBASE_URL === 'YOUR_POCKETBASE_URL'
const pb = DEMO_MODE ? null : new PocketBase(POCKETBASE_URL)

// ── Redirect if already logged in ──────────────────────────
if (DEMO_MODE) {
  window.location.replace('dashboard.html')
} else if (pb.authStore.isValid) {
  window.location.replace('dashboard.html')
}

// ── Tab switching ───────────────────────────────────────────
let activeTab = 'login'
function switchTab(tab) {
  activeTab = tab
  document.getElementById('form-login').classList.toggle('hidden', tab !== 'login')
  document.getElementById('form-register').classList.toggle('hidden', tab !== 'register')
  document.getElementById('tab-login').className = `flex-1 py-2.5 rounded-xl font-headline font-bold text-sm transition-all ${tab==='login' ? 'bg-secondary-fixed text-on-secondary-fixed' : 'text-white/40 hover:text-white'}`
  document.getElementById('tab-register').className = `flex-1 py-2.5 rounded-xl font-headline font-bold text-sm transition-all ${tab==='register' ? 'bg-secondary-fixed text-on-secondary-fixed' : 'text-white/40 hover:text-white'}`
  clearMsg()
}
switchTab('login')

// ── Messages ────────────────────────────────────────────────
function showMsg(text, type = 'error') {
  const el = document.getElementById('msg')
  const isErr = type === 'error'
  el.className = `mb-4 px-4 py-3 rounded-xl text-sm font-body flex items-center gap-2 ${isErr ? 'bg-red-900/40 text-red-300 border border-red-500/20' : 'bg-secondary-fixed/10 text-secondary-fixed border border-secondary-fixed/20'}`
  el.innerHTML = `<span class="material-symbols-outlined text-base flex-shrink-0">${isErr ? 'warning' : 'check_circle'}</span><span>${text}</span>`
  el.classList.remove('hidden')
}
function clearMsg() { document.getElementById('msg').classList.add('hidden') }

// ── Pw visibility ────────────────────────────────────────────
function togglePw(id, btn) {
  const inp = document.getElementById(id)
  const show = inp.type === 'password'
  inp.type = show ? 'text' : 'password'
  btn.querySelector('.material-symbols-outlined').textContent = show ? 'visibility_off' : 'visibility'
}

// ── Set button loading ───────────────────────────────────────
function setLoading(btnId, loading) {
  const btn = document.getElementById(btnId)
  btn.disabled = loading
  btn.style.opacity = loading ? '0.6' : ''
}

// ── Login ────────────────────────────────────────────────────
async function handleLogin(e) {
  e.preventDefault()
  clearMsg()
  setLoading('btn-login', true)
  const email = document.getElementById('login-email').value.trim()
  const password = document.getElementById('login-pw').value
  try {
    await pb.collection('users').authWithPassword(email, password)
    window.location.replace('dashboard.html')
  } catch(err) {
    setLoading('btn-login', false)
    showMsg(translateError(err.message))
  }
}

// ── Register ─────────────────────────────────────────────────
async function handleRegister(e) {
  e.preventDefault()
  clearMsg()
  const gender = document.querySelector('input[name="gender"]:checked')?.value
  if (!gender) { showMsg('Bitte Geschlecht auswählen'); return }
  setLoading('btn-register', true)
  const first = document.getElementById('reg-first').value.trim()
  const last  = document.getElementById('reg-last').value.trim()
  const email = document.getElementById('reg-email').value.trim()
  const pw    = document.getElementById('reg-pw').value
  const display_name = `${first} ${last}`

  try {
    await pb.collection('users').create({ email, password: pw, passwordConfirm: pw, display_name, gender, role: 'mitglied' })
    await pb.collection('users').authWithPassword(email, pw)
    window.location.replace('dashboard.html')
  } catch(err) {
    setLoading('btn-register', false)
    showMsg(translateError(err.message))
  }
}

function translateError(msg) {
  if (/invalid.*credentials|wrong.*password/i.test(msg)) return 'E-Mail oder Passwort falsch.'
  if (/already exists/i.test(msg)) return 'Diese E-Mail ist bereits registriert.'
  if (/password.*least/i.test(msg)) return 'Passwort muss mindestens 8 Zeichen haben.'
  if (/valid email/i.test(msg)) return 'Bitte gültige E-Mail-Adresse eingeben.'
  return msg
}
</script>
</body>
</html>
