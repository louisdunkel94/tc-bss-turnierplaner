<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>TC Bad Soden-Salmünster – Turniere</title>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;500;600;700;800;900&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms"></script>
<script src="https://cdn.jsdelivr.net/npm/pocketbase/dist/pocketbase.umd.js"></script>
<script src="config.js"></script>
<script>
tailwind.config = {
  darkMode:"class",
  theme:{extend:{
    colors:{
      "primary":"#003908","primary-container":"#115217",
      "on-primary-container":"#83c57c",
      "secondary-fixed":"#dbed50","on-secondary-fixed":"#1a1e00",
      "secondary-fixed-dim":"#bfd035",
      "outline-variant":"#c0c9bb","error":"#ba1a1a"
    },
    fontFamily:{headline:["Lexend","sans-serif"],body:["Plus Jakarta Sans","sans-serif"]},
    borderRadius:{DEFAULT:"0.125rem",lg:"0.25rem",xl:"0.5rem","2xl":"0.75rem",full:"9999px"}
  }}
}
</script>
<style>
  body{font-family:'Plus Jakarta Sans',sans-serif;background-color:#0a1f0b;color:#fff;min-height:100vh;}
  .font-headline,h1,h2,h3{font-family:'Lexend',sans-serif;}
  .material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;vertical-align:middle;user-select:none;}
  .bg-hero{background:radial-gradient(ellipse 80% 60% at 50% -10%, rgba(219,237,80,.12) 0%, transparent 60%), linear-gradient(180deg, #0a1f0b 0%, #115217 50%, #0a1f0b 100%);}
  input:-webkit-autofill{-webkit-box-shadow:0 0 0 30px #fff inset!important;-webkit-text-fill-color:#111!important;}
</style>
</head>
<body class="bg-hero">

<!-- ── Noise overlay ─── -->
<div class="fixed inset-0 opacity-[0.03] pointer-events-none" style="background-image:url('data:image/svg+xml,%3Csvg viewBox=%220 0 256 256%22 xmlns=%22http://www.w3.org/2000/svg%22%3E%3Cfilter id=%22n%22%3E%3CfeTurbulence type=%22fractalNoise%22 baseFrequency=%220.9%22 numOctaves=%224%22/%3E%3C/filter%3E%3Crect width=%22100%25%22 height=%22100%25%22 filter=%22url(%23n)%22/%3E%3C/svg%3E');background-size:200px;"></div>

<div class="relative min-h-screen flex flex-col items-center justify-center px-4 py-12">

  <!-- ── Logo ── -->
  <div class="flex flex-col items-center mb-10 select-none">
    <div class="mb-3 drop-shadow-[0_0_24px_rgba(219,237,80,.25)]">
      <img src="logo.png" alt="TC Bad Soden-Salmünster" class="w-28 h-28 object-contain"/>
    </div>
    <div class="text-2xl font-black tracking-tight font-headline text-white leading-tight text-center">TC Bad Soden-<br>Salmünster</div>
    <div class="text-xs text-secondary-fixed font-headline uppercase tracking-[.25em] mt-1.5 opacity-80">Turnierplaner</div>
  </div>

  <!-- ── Card ── -->
  <div class="w-full max-w-sm">
    <!-- Message banner -->
    <div id="msg" class="hidden mb-4 px-4 py-3 rounded-xl text-sm font-body flex items-center gap-2"></div>

    <!-- Password form (demo mode) -->
    <form id="form-pw" class="space-y-3" onsubmit="handlePassword(event)">
      <div>
        <label class="block text-xs font-headline font-bold uppercase tracking-widest text-white/40 mb-1.5">Passwort</label>
        <div class="relative">
          <input type="password" id="pw-input" required placeholder="••••••••" autofocus
            class="w-full bg-white/90 border border-white/20 text-gray-900 placeholder-gray-400 rounded-xl px-4 py-3 text-sm font-body focus:outline-none focus:border-secondary-fixed focus:bg-white transition-colors pr-11"/>
          <button type="button" onclick="togglePw('pw-input',this)" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 transition-colors">
            <span class="material-symbols-outlined text-base">visibility</span>
          </button>
        </div>
      </div>
      <button type="submit" id="btn-pw"
        class="w-full py-3 rounded-xl font-headline font-bold text-sm bg-secondary-fixed text-on-secondary-fixed hover:bg-secondary-fixed-dim transition-colors flex items-center justify-center gap-2 mt-1">
        <span class="material-symbols-outlined text-base">login</span>Einloggen
      </button>
    </form>

    <!-- PocketBase login/register forms (unused in demo mode) -->
    <form id="form-login" class="hidden"></form>
    <form id="form-register" class="hidden"></form>
  </div>

  <!-- ── Footer ── -->
  <p class="text-white/20 text-xs font-body mt-10 text-center">
    Mit der Registrierung stimmst du der Nutzung deiner Daten für den Turnierbetrieb beim TC Bad Soden-Salmünster zu.
  </p>
</div>

<script>
const POCKETBASE_URL = (typeof CONFIG !== 'undefined' ? CONFIG.POCKETBASE_URL : null) || 'YOUR_POCKETBASE_URL'
const DEMO_MODE = POCKETBASE_URL === 'YOUR_POCKETBASE_URL'
const pb = DEMO_MODE ? null : new PocketBase(POCKETBASE_URL)

if (!DEMO_MODE && pb.authStore.isValid) window.location.replace('dashboard.html')
if (DEMO_MODE && sessionStorage.getItem('tc_auth') === '1') window.location.replace('dashboard.html')

function showMsg(text, type = 'error') {
  const el = document.getElementById('msg')
  const isErr = type === 'error'
  el.className = `mb-4 px-4 py-3 rounded-xl text-sm font-body flex items-center gap-2 ${isErr ? 'bg-red-900/40 text-red-300 border border-red-500/20' : 'bg-secondary-fixed/10 text-secondary-fixed border border-secondary-fixed/20'}`
  el.innerHTML = `<span class="material-symbols-outlined text-base flex-shrink-0">${isErr ? 'warning' : 'check_circle'}</span><span>${text}</span>`
  el.classList.remove('hidden')
}

function togglePw(id, btn) {
  const inp = document.getElementById(id)
  const show = inp.type === 'password'
  inp.type = show ? 'text' : 'password'
  btn.querySelector('.material-symbols-outlined').textContent = show ? 'visibility_off' : 'visibility'
}

function handlePassword(e) {
  e.preventDefault()
  const pw = document.getElementById('pw-input').value
  if (pw === 'tcbss') {
    sessionStorage.setItem('tc_auth', '1')
    window.location.replace('dashboard.html')
  } else {
    showMsg('Falsches Passwort.')
    document.getElementById('pw-input').value = ''
    document.getElementById('pw-input').focus()
  }
}
</script>
</body>
</html>
